<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计职称考试 - 练习自测系统（200 题终极版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .badge-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #6c757d; }
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
        }
        .nav-tab {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s;
        }
        .nav-tab:hover { background: #e9ecef; }
        .nav-tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .question-type {
            background: #e9ecef;
            color: #6c757d;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #212529;
            margin-bottom: 20px;
        }
        .options { list-style: none; }
        .option {
            padding: 12px 20px;
            margin: 8px 0;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        .option:hover { border-color: #667eea; background: #f0f0ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option.correct { border-color: #28a745; background: #28a745; color: white; }
        .option.incorrect { border-color: #dc3545; background: #dc3545; color: white; }
        .option-label {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
        }
        .option.selected .option-label { background: white; color: #667eea; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .explanation {
            display: none;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }
        .explanation.show { display: block; }
        .explanation h4 { color: #2e7d32; margin-bottom: 10px; }
        .explanation p { color: #1b5e20; line-height: 1.6; }
        .score-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .score-number { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .score-level { font-size: 20px; opacity: 0.9; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .knowledge-point {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 13px;
            color: #856404;
            display: inline-block;
            margin-bottom: 10px;
        }
        .action-buttons { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .chapter-filter {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .chapter-filter select {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 14px;
            margin-right: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .difficulty {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        .difficulty.easy { background: #d4edda; color: #155724; }
        .difficulty.medium { background: #fff3cd; color: #856404; }
        .difficulty.hard { background: #f8d7da; color: #721c24; }
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 22px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 初级会计职称考试</h1>
            <p>练习自测系统 - 2026 年复习资料（200 题终极版）</p>
            <div class="badge-container">
                <span class="badge">💰 会计实务 100 题</span>
                <span class="badge">⚖️ 经济法 100 题</span>
                <span class="badge">📝 单选 + 多选 + 判断</span>
                <span class="badge">⭐ 难度分级</span>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="total-answered">0</div>
                <div class="stat-label">已答题</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="total-correct">0</div>
                <div class="stat-label">正确数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="accuracy-rate">0%</div>
                <div class="stat-label">正确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="remaining">200</div>
                <div class="stat-label">剩余题</div>
            </div>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('accounting')">💰 会计实务</button>
            <button class="nav-tab" onclick="showSection('economy')">⚖️ 经济法</button>
            <button class="nav-tab" onclick="showSection('summary')">📊 答题统计</button>
        </div>
        
        <div class="content">
            <div id="accounting" class="section active">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('accounting', 'all')">📝 全部练习 (100 题)</button>
                    <button class="btn btn-info" onclick="startPractice('accounting', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('accounting', 'random10')">🎲 随机 10 题</button>
                    <button class="btn btn-success" onclick="startPractice('accounting', 'random20')">🎯 随机 20 题</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('accounting', this.value)">
                        <option value="all">全部章节</option>
                        <option value="会计基础">会计基础</option>
                        <option value="资产">资产</option>
                        <option value="负债">负债</option>
                        <option value="所有者权益">所有者权益</option>
                        <option value="收入费用利润">收入、费用、利润</option>
                        <option value="财务报表">财务报表</option>
                        <option value="管理会计基础">管理会计基础</option>
                        <option value="政府会计">政府会计</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="accounting-progress" style="width: 0%"></div></div>
                <div id="accounting-questions"></div>
            </div>
            
            <div id="economy" class="section">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('economy', 'all')">📝 全部练习 (100 题)</button>
                    <button class="btn btn-info" onclick="startPractice('economy', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('economy', 'random10')">🎲 随机 10 题</button>
                    <button class="btn btn-success" onclick="startPractice('economy', 'random20')">🎯 随机 20 题</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('economy', this.value)">
                        <option value="all">全部章节</option>
                        <option value="会计法律制度">会计法律制度</option>
                        <option value="支付结算">支付结算法律制度</option>
                        <option value="增值税">增值税法律制度</option>
                        <option value="消费税">消费税法律制度</option>
                        <option value="所得税">所得税法律制度</option>
                        <option value="其他税种">其他税种法律制度</option>
                        <option value="劳动合同">劳动合同与社会保险</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="economy-progress" style="width: 0%"></div></div>
                <div id="economy-questions"></div>
            </div>
            
            <div id="summary" class="section">
                <div class="score-display">
                    <div>总得分</div>
                    <div class="score-number" id="total-score">0 / 200</div>
                    <div class="score-level" id="score-level">开始答题吧！</div>
                </div>
                <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #667eea;" id="accounting-score">0</div>
                        <div style="color: #6c757d;">会计实务</div>
                        <div style="font-size: 12px;">(100 题)</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #764ba2;" id="economy-score">0</div>
                        <div style="color: #6c757d;">经济法</div>
                        <div style="font-size: 12px;">(100 题)</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resetAll()">🔄 重新开始</button>
                    <button class="btn btn-success" onclick="showSection('accounting')">📝 继续练习</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 会计实务 100 题
        const accountingQuestions = [
            {id:1,type:"单选",point:"会计基础",difficulty:"easy",text:"下列属于企业资产要素的是？",options:{A:"实收资本",B:"应付账款",C:"银行存款",D:"未分配利润"},answer:"C",explanation:"银行存款属于资产要素，实收资本和未分配利润属于所有者权益，应付账款属于负债。"},
            {id:2,type:"单选",point:"会计基础",difficulty:"easy",text:"借贷记账法的记账规则是？",options:{A:"有借必有贷，借贷必相等",B:"借方增加，贷方减少",C:"资产在借方，负债在贷方",D:"收入增加记借方"},answer:"A",explanation:"借贷记账法的基本规则是：有借必有贷，借贷必相等。"},
            {id:3,type:"单选",point:"资产",difficulty:"medium",text:"下列不属于固定资产折旧方法的是？",options:{A:"年限平均法",B:"工作量法",C:"年数总和法",D:"直接法"},answer:"D",explanation:"固定资产折旧方法包括：年限平均法、工作量法、双倍余额递减法、年数总和法等。"},
            {id:4,type:"单选",point:"会计基础",difficulty:"easy",text:"\"管理费用\"科目属于什么类科目？",options:{A:"资产类",B:"负债类",C:"损益类",D:"成本类"},answer:"C",explanation:"管理费用属于损益类科目中的费用类科目。"},
            {id:5,type:"单选",point:"财务报表",difficulty:"easy",text:"资产负债表反映的是企业在特定日期的？",options:{A:"经营成果",B:"现金流量",C:"财务状况",D:"所有者权益变动"},answer:"C",explanation:"资产负债表反映企业在某一特定日期的财务状况。"},
            {id:6,type:"单选",point:"财务报表",difficulty:"easy",text:"利润表反映企业在一定期间的？",options:{A:"财务状况",B:"现金流量",C:"经营成果",D:"所有者权益变动"},answer:"C",explanation:"利润表反映企业在一定期间的经营成果。"},
            {id:7,type:"多选",point:"会计基础",difficulty:"medium",text:"会计基本假设包括？",options:{A:"会计主体",B:"持续经营",C:"会计分期",D:"货币计量"},answer:"ABCD",explanation:"会计基本假设包括：会计主体、持续经营、会计分期、货币计量。"},
            {id:8,type:"多选",point:"资产",difficulty:"medium",text:"下列属于货币资金的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"应收账款"},answer:"ABC",explanation:"货币资金包括：库存现金、银行存款、其他货币资金。应收账款属于债权资产。"},
            {id:9,type:"判断",point:"收入费用利润",difficulty:"medium",text:"企业销售商品只要收到款项就可以确认收入。",answer:"错误",explanation:"收入确认需要同时满足五个条件：合同已签订、商品所有权转移、经济利益很可能流入、企业成本能够可靠计量。"},
            {id:10,type:"判断",point:"资产",difficulty:"medium",text:"发出存货的计价方法一旦确定，不得变更。",answer:"错误",explanation:"发出存货的计价方法可以根据实际情况变更，但需要在会计报表中披露变更情况。"},
            {id:11,type:"单选",point:"资产",difficulty:"easy",text:"下列各项中，属于流动资产的是？",options:{A:"固定资产",B:"无形资产",C:"存货",D:"长期股权投资"},answer:"C",explanation:"存货属于流动资产，固定资产、无形资产、长期股权投资属于非流动资产。"},
            {id:12,type:"单选",point:"负债",difficulty:"easy",text:"下列各项中，属于流动负债的是？",options:{A:"长期借款",B:"应付债券",C:"应付账款",D:"长期应付款"},answer:"C",explanation:"应付账款属于流动负债，其他三项属于非流动负债。"},
            {id:13,type:"单选",point:"所有者权益",difficulty:"easy",text:"下列各项中，不属于所有者权益的是？",options:{A:"实收资本",B:"资本公积",C:"盈余公积",D:"长期股权投资"},answer:"D",explanation:"长期股权投资属于资产，不属于所有者权益。"},
            {id:14,type:"多选",point:"收入费用利润",difficulty:"medium",text:"下列各项中，属于收入的有？",options:{A:"销售商品收入",B:"提供劳务收入",C:"让渡资产使用权收入",D:"营业外收入"},answer:"ABC",explanation:"收入包括销售商品收入、提供劳务收入、让渡资产使用权收入。营业外收入不属于收入要素。"},
            {id:15,type:"单选",point:"会计基础",difficulty:"easy",text:"最基本的会计等式是？",options:{A:"资产=负债 + 所有者权益",B:"收入 - 费用=利润",C:"资产=权益",D:"资产 + 费用=负债 + 所有者权益 + 收入"},answer:"A",explanation:"资产=负债 + 所有者权益是最基本的会计等式，也称为静态会计等式。"},
            {id:16,type:"判断",point:"会计基础",difficulty:"medium",text:"\"累计折旧\"科目是资产类科目，但属于资产的备抵科目。",answer:"正确",explanation:"累计折旧是固定资产的备抵科目，借方登记减少，贷方登记增加，余额在贷方。"},
            {id:17,type:"单选",point:"资产",difficulty:"easy",text:"企业购入不需要安装的设备一台，应借记的科目是？",options:{A:"在建工程",B:"固定资产",C:"制造费用",D:"管理费用"},answer:"B",explanation:"购入不需要安装的固定资产，直接借记\"固定资产\"科目。"},
            {id:18,type:"单选",point:"费用",difficulty:"easy",text:"下列各项中，应计入产品成本的是？",options:{A:"管理费用",B:"销售费用",C:"财务费用",D:"制造费用"},answer:"D",explanation:"制造费用应计入产品成本，其他三项属于期间费用。"},
            {id:19,type:"多选",point:"会计基础",difficulty:"medium",text:"会计凭证按照填制程序和用途可分为？",options:{A:"原始凭证",B:"记账凭证",C:"收款凭证",D:"付款凭证"},answer:"AB",explanation:"会计凭证按填制程序和用途分为原始凭证和记账凭证。收款凭证和付款凭证是记账凭证的进一步分类。"},
            {id:20,type:"判断",point:"会计基础",difficulty:"medium",text:"总分类账和明细分类账必须平行登记。",answer:"正确",explanation:"总分类账和明细分类账平行登记要求：依据相同、方向相同、期间相同、金额相等。"},
            {id:21,type:"单选",point:"资产",difficulty:"medium",text:"下列各项中，不应计入存货成本的是？",options:{A:"购买价款",B:"相关税费",C:"运输费",D:"非正常损耗"},answer:"D",explanation:"非正常损耗不计入存货成本，应计入当期损益。"},
            {id:22,type:"单选",point:"资产",difficulty:"medium",text:"固定资产折旧应计入的科目是？",options:{A:"管理费用",B:"制造费用",C:"根据用途计入不同科目",D:"销售费用"},answer:"C",explanation:"固定资产折旧根据用途计入不同科目：管理部门用计入管理费用，生产车间用计入制造费用，销售部门用计入销售费用。"},
            {id:23,type:"多选",point:"财务报表",difficulty:"medium",text:"下列属于财务报表的有？",options:{A:"资产负债表",B:"利润表",C:"现金流量表",D:"所有者权益变动表"},answer:"ABCD",explanation:"财务报表包括：资产负债表、利润表、现金流量表、所有者权益变动表及附注。"},
            {id:24,type:"判断",point:"会计基础",difficulty:"medium",text:"会计信息质量要求中的可比性要求同一企业不同时期发生的相同交易应采用一致的会计政策。",answer:"正确",explanation:"可比性要求同一企业不同时期可比（纵向可比），不同企业相同会计期间可比（横向可比）。"},
            {id:25,type:"单选",point:"会计基础",difficulty:"easy",text:"下列各项中，属于反映企业经营成果的会计要素是？",options:{A:"资产",B:"负债",C:"所有者权益",D:"利润"},answer:"D",explanation:"反映经营成果的会计要素包括：收入、费用、利润。资产、负债、所有者权益反映财务状况。"},
            {id:26,type:"单选",point:"资产",difficulty:"medium",text:"应收账款的入账价值不包括？",options:{A:"销售商品价款",B:"增值税销项税额",C:"代垫运杂费",D:"商业折扣"},answer:"D",explanation:"商业折扣在销售时已扣除，不计入应收账款。应收账款包括价款、增值税、代垫费用等。"},
            {id:27,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，应计入存货采购成本的有？",options:{A:"购买价款",B:"进口关税",C:"运输途中的合理损耗",D:"入库前的挑选整理费"},answer:"ABCD",explanation:"存货采购成本包括：购买价款、相关税费、运输费、装卸费、保险费、运输途中合理损耗、入库前挑选整理费等。"},
            {id:28,type:"判断",point:"资产",difficulty:"medium",text:"交易性金融资产持有期间取得的现金股利应计入投资收益。",answer:"正确",explanation:"交易性金融资产持有期间，被投资单位宣告发放的现金股利，应确认为投资收益。"},
            {id:29,type:"单选",point:"负债",difficulty:"easy",text:"下列各项中，应通过\"应付职工薪酬\"科目核算的是？",options:{A:"职工工资",B:"职工福利费",C:"社会保险费",D:"以上都是"},answer:"D",explanation:"应付职工薪酬核算企业应付给职工的各种薪酬，包括工资、福利费、社会保险费、住房公积金等。"},
            {id:30,type:"单选",point:"所有者权益",difficulty:"medium",text:"下列各项中，不属于留存收益的是？",options:{A:"资本公积",B:"盈余公积",C:"未分配利润",D:"以上都不是"},answer:"A",explanation:"留存收益包括盈余公积和未分配利润。资本公积不属于留存收益。"},
            {id:31,type:"多选",point:"收入费用利润",difficulty:"hard",text:"下列各项中，应确认为其他业务收入的有？",options:{A:"销售材料收入",B:"出租固定资产租金收入",C:"出售无形资产净收益",D:"出租包装物租金收入"},answer:"ABD",explanation:"其他业务收入包括销售材料、出租固定资产、出租包装物等。出售无形资产净收益计入资产处置损益。"},
            {id:32,type:"判断",point:"费用",difficulty:"easy",text:"期间费用包括管理费用、销售费用和财务费用。",answer:"正确",explanation:"期间费用是指企业日常活动中不能直接归属于某个特定成本核算对象的费用，包括管理费用、销售费用和财务费用。"},
            {id:33,type:"单选",point:"负债",difficulty:"medium",text:"下列各项中，属于资产负债表流动负债项目的是？",options:{A:"长期借款",B:"应付债券",C:"应付票据",D:"长期应付款"},answer:"C",explanation:"应付票据属于流动负债，其他三项属于非流动负债。"},
            {id:34,type:"多选",point:"财务报表",difficulty:"medium",text:"下列各项中，属于利润表项目的有？",options:{A:"营业收入",B:"营业成本",C:"税金及附加",D:"销售费用"},answer:"ABCD",explanation:"利润表项目包括营业收入、营业成本、税金及附加、销售费用、管理费用、财务费用等。"},
            {id:35,type:"判断",point:"会计基础",difficulty:"medium",text:"原始凭证金额有错误的，应当由出具单位重开，不得在原始凭证上更正。",answer:"正确",explanation:"原始凭证金额有错误的，必须由出具单位重开，不得更正。其他内容错误可由出具单位更正并盖章。"},
            {id:36,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，应采用数量金额式账页格式的是？",options:{A:"库存现金日记账",B:"银行存款日记账",C:"原材料明细账",D:"管理费用明细账"},answer:"C",explanation:"原材料明细账应采用数量金额式，同时登记数量和金额。现金和银行存款日记账采用三栏式，管理费用明细账采用多栏式。"},
            {id:37,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，应计提固定资产折旧的有？",options:{A:"季节性停用的设备",B:"已提足折旧继续使用的设备",C:"未使用的房屋",D:"经营租入的设备"},answer:"AC",explanation:"季节性停用和未使用的固定资产应计提折旧。已提足折旧继续使用和经营租入的设备不计提折旧。"},
            {id:38,type:"判断",point:"资产",difficulty:"medium",text:"无形资产摊销一定计入管理费用。",answer:"错误",explanation:"无形资产摊销根据用途计入不同科目：管理用计入管理费用，生产用计入制造费用，出租用计入其他业务成本。"},
            {id:39,type:"单选",point:"负债",difficulty:"medium",text:"下列各项中，不属于流动负债的是？",options:{A:"预收账款",B:"预付账款",C:"应付利息",D:"一年内到期的长期借款"},answer:"B",explanation:"预付账款属于资产，不属于负债。预收账款、应付利息、一年内到期的长期借款都属于流动负债。"},
            {id:40,type:"单选",point:"所有者权益",difficulty:"hard",text:"下列各项中，会引起所有者权益总额发生增减变动的是？",options:{A:"盈余公积转增资本",B:"资本公积转增资本",C:"宣告发放现金股利",D:"盈余公积弥补亏损"},answer:"C",explanation:"宣告发放现金股利会减少未分配利润，从而减少所有者权益总额。其他三项是所有者权益内部结转，不影响总额。"},
            {id:41,type:"多选",point:"收入费用利润",difficulty:"hard",text:"下列各项中，应计入营业外收入的有？",options:{A:"盘盈利得",B:"捐赠利得",C:"罚款收入",D:"确实无法支付的应付账款"},answer:"ABCD",explanation:"营业外收入包括盘盈利得、捐赠利得、罚款收入、无法支付的应付款项等非日常活动形成的利得。"},
            {id:42,type:"判断",point:"费用",difficulty:"medium",text:"生产成本属于费用要素。",answer:"错误",explanation:"生产成本属于成本，不属于费用要素。费用包括期间费用（管理费用、销售费用、财务费用）。"},
            {id:43,type:"单选",point:"会计基础",difficulty:"medium",text:"某企业资产总额为 100 万元，负债总额为 40 万元，则所有者权益总额为？",options:{A:"40 万元",B:"60 万元",C:"100 万元",D:"140 万元"},answer:"B",explanation:"根据会计等式：资产=负债 + 所有者权益，所有者权益=资产 - 负债=100-40=60 万元。"},
            {id:44,type:"多选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于损益类科目的有？",options:{A:"主营业务收入",B:"主营业务成本",C:"本年利润",D:"所得税费用"},answer:"ABD",explanation:"损益类科目包括收入类（主营业务收入等）、费用类（主营业务成本、所得税费用等）。本年利润属于所有者权益类科目。"},
            {id:45,type:"判断",point:"会计基础",difficulty:"easy",text:"记账凭证可以根据每一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制。",answer:"正确",explanation:"记账凭证可以根据一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制，还可以根据原始凭证汇总表填制。"},
            {id:46,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，适用于订本式账簿的是？",options:{A:"原材料明细账",B:"管理费用明细账",C:"库存现金日记账",D:"应收账款明细账"},answer:"C",explanation:"订本式账簿适用于总分类账、库存现金日记账、银行存款日记账等重要账簿。明细账一般采用活页式。"},
            {id:47,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，属于其他应收款核算内容的有？",options:{A:"应收的各种赔款",B:"应收的出租包装物租金",C:"存出保证金",D:"代购货单位垫付的运杂费"},answer:"ABC",explanation:"其他应收款核算除应收票据、应收账款、预付账款等以外的各种应收、暂付款项。代购货单位垫付的运杂费计入应收账款。"},
            {id:48,type:"判断",point:"负债",difficulty:"medium",text:"企业计提短期借款利息时，应借记\"财务费用\"科目，贷记\"应付利息\"科目。",answer:"正确",explanation:"短期借款利息属于筹资费用，计提时借记\"财务费用\"，贷记\"应付利息\"。"},
            {id:49,type:"单选",point:"所有者权益",difficulty:"hard",text:"下列各项中，不属于资本公积来源的是？",options:{A:"资本溢价",B:"股本溢价",C:"直接计入所有者权益的利得",D:"留存收益"},answer:"D",explanation:"资本公积来源包括资本溢价、股本溢价、直接计入所有者权益的利得等。留存收益是独立的权益项目。"},
            {id:50,type:"多选",point:"财务报表",difficulty:"hard",text:"下列各项中，属于现金流量表现金及现金等价物的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"三个月内到期的债券投资"},answer:"ABCD",explanation:"现金及现金等价物包括库存现金、银行存款、其他货币资金和三个月内到期的债券投资等。"},
            {id:51,type:"单选",point:"管理会计基础",difficulty:"medium",text:"下列各项中，属于管理会计基本职能的是？",options:{A:"核算",B:"监督",C:"预测",D:"报告"},answer:"C",explanation:"管理会计的基本职能包括预测、决策、规划、控制和考核评价。核算和监督是财务会计的职能。"},
            {id:52,type:"单选",point:"管理会计基础",difficulty:"medium",text:"本量利分析中，保本点的计算公式是？",options:{A:"固定成本/单位贡献毛益",B:"变动成本/单位贡献毛益",C:"固定成本/单价",D:"变动成本/单价"},answer:"A",explanation:"保本点销售量=固定成本/单位贡献毛益，其中单位贡献毛益=单价 - 单位变动成本。"},
            {id:53,type:"多选",point:"管理会计基础",difficulty:"hard",text:"下列各项中，属于变动成本的有？",options:{A:"直接材料",B:"直接人工",C:"管理人员工资",D:"销售佣金"},answer:"ABD",explanation:"变动成本随业务量成正比例变动，包括直接材料、直接人工、销售佣金等。管理人员工资属于固定成本。"},
            {id:54,type:"判断",point:"管理会计基础",difficulty:"medium",text:"贡献毛益等于销售收入减去变动成本。",answer:"正确",explanation:"贡献毛益=销售收入 - 变动成本，是补偿固定成本后形成利润的部分。"},
            {id:55,type:"单选",point:"政府会计",difficulty:"medium",text:"政府会计由预算会计和财务会计构成，实行？",options:{A:"单基础",B:"双基础",C:"三基础",D:"多基础"},answer:"B",explanation:"政府会计实行\"双基础\"，预算会计实行收付实现制，财务会计实行权责发生制。"},
            {id:56,type:"多选",point:"政府会计",difficulty:"hard",text:"下列各项中，属于政府会计要素的有？",options:{A:"预算收入",B:"预算支出",C:"预算结余",D:"净资产"},answer:"ABCD",explanation:"政府预算会计要素包括预算收入、预算支出、预算结余。政府财务会计要素包括资产、负债、净资产、收入和费用。"},
            {id:57,type:"判断",point:"政府会计",difficulty:"easy",text:"政府会计主体应当编制决算报告和财务报告。",answer:"正确",explanation:"政府会计主体应当编制决算报告（反映预算执行情况）和财务报告（反映财务状况）。"},
            {id:58,type:"单选",point:"资产",difficulty:"hard",text:"下列各项中，不应确认为无形资产的是？",options:{A:"专利权",B:"商标权",C:"商誉",D:"著作权"},answer:"C",explanation:"商誉具有不可辨认性，不属于无形资产。无形资产包括专利权、商标权、著作权、土地使用权、非专利技术等。"},
            {id:59,type:"单选",point:"负债",difficulty:"hard",text:"企业发行债券，实际收到的价款与债券面值的差额，应计入？",options:{A:"资本公积",B:"应付债券——利息调整",C:"财务费用",D:"投资收益"},answer:"B",explanation:"发行债券实际收到价款与面值的差额，计入\"应付债券——利息调整\"科目，在债券存续期间采用实际利率法摊销。"},
            {id:60,type:"多选",point:"所有者权益",difficulty:"hard",text:"下列各项中，会引起留存收益总额发生变动的有？",options:{A:"提取盈余公积",B:"盈余公积转增资本",C:"盈余公积弥补亏损",D:"向投资者分配利润"},answer:"BD",explanation:"盈余公积转增资本会减少留存收益。向投资者分配利润会减少未分配利润，从而减少留存收益。提取盈余公积和盈余公积补亏是留存收益内部结转。"},
            {id:61,type:"单选",point:"收入费用利润",difficulty:"hard",text:"企业出售固定资产取得的净收益，应计入？",options:{A:"主营业务收入",B:"其他业务收入",C:"营业外收入",D:"资产处置损益"},answer:"D",explanation:"出售固定资产的净收益计入\"资产处置损益\"科目，属于利得但不属于营业外收入。"},
            {id:62,type:"判断",point:"财务报表",difficulty:"medium",text:"资产负债表中的\"货币资金\"项目，应根据\"库存现金\"、\"银行存款\"和\"其他货币资金\"科目期末余额合计数填列。",answer:"正确",explanation:"货币资金项目应根据库存现金、银行存款、其他货币资金三个总账科目期末余额的合计数填列。"},
            {id:63,type:"单选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于会计政策变更的是？",options:{A:"固定资产折旧方法由年限平均法改为年数总和法",B:"存货发出计价方法由先进先出法改为加权平均法",C:"坏账准备计提比例由 5% 改为 10%",D:"固定资产预计使用年限由 10 年改为 8 年"},answer:"B",explanation:"存货发出计价方法的变更属于会计政策变更。折旧方法、坏账准备计提比例、预计使用年限的变更属于会计估计变更。"},
            {id:64,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，表明存货可变现净值低于成本的有？",options:{A:"存货市场价格持续下跌",B:"企业使用原材料生产的产品成本大于售价",C:"存货已过期且无转让价值",D:"存货已霉烂变质"},answer:"ABCD",explanation:"存货可变现净值低于成本的情形包括：市价持续下跌、产品成本大于售价、存货过期、霉烂变质、不再需要等。"},
            {id:65,type:"单选",point:"资产",difficulty:"medium",text:"企业以摊余成本计量的金融资产，应当计入的科目是？",options:{A:"交易性金融资产",B:"债权投资",C:"其他债权投资",D:"其他权益工具投资"},answer:"B",explanation:"以摊余成本计量的金融资产计入\"债权投资\"科目。以公允价值计量且其变动计入其他综合收益的计入\"其他债权投资\"。"},
            {id:66,type:"判断",point:"资产",difficulty:"medium",text:"企业持有的交易性金融资产，持有期间公允价值变动计入当期损益。",answer:"正确",explanation:"交易性金融资产持有期间公允价值变动计入\"公允价值变动损益\"科目，影响当期损益。"},
            {id:67,type:"多选",point:"负债",difficulty:"hard",text:"下列各项中，属于长期应付款核算内容的有？",options:{A:"应付融资租入固定资产的租赁费",B:"具有融资性质的延期付款",C:"应付经营租入固定资产的租金",D:"应付短期借款"},answer:"AB",explanation:"长期应付款核算企业除长期借款和应付债券以外的其他各种长期应付款项，包括应付融资租入固定资产的租赁费、具有融资性质的延期付款等。"},
            {id:68,type:"单选",point:"所有者权益",difficulty:"medium",text:"企业用盈余公积转增资本，转增后留存的盈余公积不得少于转增前注册资本的？",options:{A:"10%",B:"20%",C:"25%",D:"50%"},answer:"C",explanation:"法定盈余公积转增资本后，留存的该项盈余公积不得少于转增前公司注册资本的 25%。"},
            {id:69,type:"判断",point:"收入费用利润",difficulty:"medium",text:"企业发生的销售折让，应当冲减当期销售收入。",answer:"正确",explanation:"销售折让是指企业因售出商品质量不合格等原因而在售价上给予的减让，应冲减当期销售收入。"},
            {id:70,type:"单选",point:"财务报表",difficulty:"hard",text:"下列各项中，不影响企业营业利润的是？",options:{A:"资产减值损失",B:"公允价值变动收益",C:"投资收益",D:"营业外收入"},answer:"D",explanation:"营业外收入不影响营业利润，影响利润总额。营业利润=营业收入 - 营业成本 - 税金及附加 - 期间费用 - 资产减值损失±公允价值变动收益±投资收益。"},
            {id:71,type:"多选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于会计信息质量要求的有？",options:{A:"可靠性",B:"相关性",C:"可理解性",D:"可比性"},answer:"ABCD",explanation:"会计信息质量要求包括：可靠性、相关性、可理解性、可比性、实质重于形式、重要性、谨慎性、及时性。"},
            {id:72,type:"单选",point:"资产",difficulty:"medium",text:"企业计提的固定资产减值准备，在以后会计期间？",options:{A:"可以转回",B:"不得转回",C:"部分转回",D:"视情况转回"},answer:"B",explanation:"固定资产减值准备一经计提，在以后会计期间不得转回。这是为了防止企业操纵利润。"},
            {id:73,type:"判断",point:"负债",difficulty:"easy",text:"企业预收货款业务不多的情况下，可以不设\"预收账款\"科目，而将预收的款项直接记入\"应收账款\"科目的贷方。",answer:"正确",explanation:"预收账款业务不多的企业，可以不设\"预收账款\"科目，将预收款项记入\"应收账款\"科目的贷方。"},
            {id:74,type:"单选",point:"管理会计基础",difficulty:"hard",text:"下列各项中，属于酌量性固定成本的是？",options:{A:"房屋租金",B:"管理人员工资",C:"广告费",D:"折旧费"},answer:"C",explanation:"酌量性固定成本是指管理当局的短期经营决策行动能改变其数额的固定成本，如广告费、职工培训费、新产品研究开发费等。"},
            {id:75,type:"多选",point:"政府会计",difficulty:"hard",text:"下列各项中，属于政府财务会计资产的有？",options:{A:"零余额账户用款额度",B:"财政应返还额度",C:"公共基础设施",D:"政府储备物资"},answer:"ABCD",explanation:"政府财务会计资产包括货币资金、零余额账户用款额度、财政应返还额度、应收账款、存货、固定资产、无形资产、公共基础设施、政府储备物资等。"},
            {id:76,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，属于原始凭证的是？",options:{A:"收款凭证",B:"付款凭证",C:"转账凭证",D:"发票"},answer:"D",explanation:"发票属于原始凭证。收款凭证、付款凭证、转账凭证属于记账凭证。"},
            {id:77,type:"判断",point:"资产",difficulty:"medium",text:"企业出售交易性金融资产时，应将原计入公允价值变动损益的累计公允价值变动转入投资收益。",answer:"错误",explanation:"根据新准则，出售交易性金融资产时，不需要将原计入公允价值变动损益的累计公允价值变动转入投资收益。"},
            {id:78,type:"单选",point:"负债",difficulty:"medium",text:"企业应交的教育费附加，应计入的科目是？",options:{A:"管理费用",B:"税金及附加",C:"其他应付款",D:"应交税费"},answer:"B",explanation:"教育费附加应计入\"税金及附加\"科目，同时贷记\"应交税费——应交教育费附加\"。"},
            {id:79,type:"多选",point:"所有者权益",difficulty:"hard",text:"下列各项中，属于企业所有者权益来源的有？",options:{A:"所有者投入的资本",B:"直接计入所有者权益的利得",C:"直接计入所有者权益的损失",D:"留存收益"},answer:"ABCD",explanation:"所有者权益的来源包括：所有者投入的资本、直接计入所有者权益的利得和损失、留存收益等。"},
            {id:80,type:"单选",point:"收入费用利润",difficulty:"hard",text:"企业采用支付手续费方式委托代销商品，确认收入的时点是？",options:{A:"发出商品时",B:"收到代销清单时",C:"收到代销款时",D:"签订代销协议时"},answer:"B",explanation:"采用支付手续费方式委托代销商品，应在收到代销清单时确认收入。"},
            {id:81,type:"判断",point:"财务报表",difficulty:"medium",text:"利润表中的\"净利润\"项目，应根据\"本年利润\"科目的发生额分析填列。",answer:"错误",explanation:"利润表中的\"净利润\"项目，应根据\"本年利润\"科目的发生额和\"利润分配\"科目的发生额分析填列，或直接根据\"净利润\"计算公式填列。"},
            {id:82,type:"单选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于会计估计变更的是？",options:{A:"投资性房地产后续计量由成本模式改为公允价值模式",B:"发出存货计价方法由先进先出法改为加权平均法",C:"固定资产折旧方法由年限平均法改为双倍余额递减法",D:"合并报表编制原则由母公司理论改为实体理论"},answer:"C",explanation:"固定资产折旧方法的变更属于会计估计变更。其他三项属于会计政策变更。"},
            {id:83,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，应通过\"固定资产清理\"科目核算的有？",options:{A:"固定资产出售",B:"固定资产报废",C:"固定资产盘亏",D:"固定资产毁损"},answer:"ABD",explanation:"固定资产清理核算企业因出售、报废、毁损、对外投资、非货币性资产交换、债务重组等原因转出的固定资产价值以及在清理过程中发生的费用等。盘亏通过\"待处理财产损溢\"核算。"},
            {id:84,type:"单选",point:"管理会计基础",difficulty:"medium",text:"下列各项中，属于标准成本法优点的是？",options:{A:"简化成本核算",B:"便于成本分析",C:"提高成本意识",D:"以上都是"},answer:"D",explanation:"标准成本法的优点包括：简化成本核算、便于成本分析、提高成本意识、有利于成本控制和考核评价等。"},
            {id:85,type:"判断",point:"政府会计",difficulty:"medium",text:"政府会计主体对于发生的经济业务或者事项，应当同时进行预算会计核算和财务会计核算。",answer:"错误",explanation:"政府会计主体对于纳入部门预算管理的现金收支业务，应当同时进行预算会计核算和财务会计核算；对于其他业务，仅需进行财务会计核算。"},
            {id:86,type:"单选",point:"资产",difficulty:"hard",text:"企业持有长期股权投资，能够对被投资单位实施控制的，应当采用？",options:{A:"成本法",B:"权益法",C:"成本法或权益法",D:"公允价值法"},answer:"A",explanation:"长期股权投资能够对被投资单位实施控制的，采用成本法核算。具有共同控制或重大影响的，采用权益法核算。"},
            {id:87,type:"多选",point:"负债",difficulty:"hard",text:"下列各项中，属于职工薪酬内容的有？",options:{A:"短期薪酬",B:"离职后福利",C:"辞退福利",D:"其他长期职工福利"},answer:"ABCD",explanation:"职工薪酬包括短期薪酬、离职后福利、辞退福利和其他长期职工福利。"},
            {id:88,type:"单选",point:"收入费用利润",difficulty:"medium",text:"企业发生的业务招待费，应计入的科目是？",options:{A:"销售费用",B:"管理费用",C:"财务费用",D:"制造费用"},answer:"B",explanation:"业务招待费应计入\"管理费用\"科目。"},
            {id:89,type:"判断",point:"财务报表",difficulty:"medium",text:"现金流量表中的\"现金\"概念与资产负债表中的\"货币资金\"项目完全相同。",answer:"错误",explanation:"现金流量表中的\"现金\"包括库存现金、银行存款、其他货币资金和现金等价物。资产负债表中的\"货币资金\"不包括现金等价物。"},
            {id:90,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，不属于会计账簿按用途分类的是？",options:{A:"序时账簿",B:"分类账簿",C:"备查账簿",D:"活页式账簿"},answer:"D",explanation:"会计账簿按用途分为序时账簿、分类账簿和备查账簿。按外形特征分为订本式、活页式和卡片式。"},
            {id:91,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，影响固定资产处置损益的有？",options:{A:"固定资产原价",B:"固定资产清理费用",C:"固定资产处置收入",D:"固定资产累计折旧"},answer:"ABCD",explanation:"固定资产处置损益=处置收入 - (固定资产原价 - 累计折旧 - 减值准备)- 清理费用。因此四个选项都影响处置损益。"},
            {id:92,type:"单选",point:"所有者权益",difficulty:"medium",text:"企业当年实现的净利润，首先应当？",options:{A:"向投资者分配利润",B:"提取任意盈余公积",C:"提取法定盈余公积",D:"弥补以前年度亏损"},answer:"D",explanation:"企业当年实现的净利润，首先应当弥补以前年度亏损，然后提取法定盈余公积，再提取任意盈余公积，最后向投资者分配利润。"},
            {id:93,type:"判断",point:"管理会计基础",difficulty:"medium",text:"变动成本法下，固定制造费用作为期间费用处理，直接计入当期损益。",answer:"正确",explanation:"变动成本法下，固定制造费用不作为产品成本组成部分，而作为期间费用直接计入当期损益。"},
            {id:94,type:"单选",point:"资产",difficulty:"hard",text:"下列各项中，应计提坏账准备的是？",options:{A:"交易性金融资产",B:"应收账款",C:"存货",D:"固定资产"},answer:"B",explanation:"应收账款应计提坏账准备。交易性金融资产按公允价值计量，存货计提跌价准备，固定资产计提减值准备。"},
            {id:95,type:"多选",point:"财务报表",difficulty:"hard",text:"下列各项中，属于资产负债表非流动负债项目的有？",options:{A:"长期借款",B:"应付债券",C:"长期应付款",D:"预计负债"},answer:"ABCD",explanation:"非流动负债包括长期借款、应付债券、长期应付款、预计负债、递延收益、递延所得税负债等。"},
            {id:96,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，属于汇总记账凭证账务处理程序优点的是？",options:{A:"简单明了",B:"便于查账",C:"减轻登记总账工作量",D:"以上都是"},answer:"C",explanation:"汇总记账凭证账务处理程序的优点是减轻登记总分类账的工作量，便于了解账户之间的对应关系。"},
            {id:97,type:"判断",point:"政府会计",difficulty:"hard",text:"政府会计主体应当将发生的各项经济业务或者事项统一纳入会计核算，确保会计信息能够全面反映政府会计主体预算执行情况和财务状况。",answer:"正确",explanation:"这是政府会计的全面性原则要求，确保会计信息完整、全面。"},
            {id:98,type:"单选",point:"收入费用利润",difficulty:"hard",text:"企业采用预收款方式销售商品，确认收入的时点是？",options:{A:"收到预收款时",B:"发出商品时",C:"商品所有权转移时",D:"合同约定的收款日"},answer:"B",explanation:"采用预收款方式销售商品，应在发出商品时确认收入。收到预收款时确认为负债（合同负债）。"},
            {id:99,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，属于投资性房地产的有？",options:{A:"已出租的土地使用权",B:"持有并准备增值后转让的土地使用权",C:"已出租的建筑物",D:"自用房地产"},answer:"ABC",explanation:"投资性房地产包括：已出租的土地使用权、持有并准备增值后转让的土地使用权、已出租的建筑物。自用房地产属于固定资产或无形资产。"},
            {id:100,type:"判断",point:"会计基础",difficulty:"medium",text:"企业应当以权责发生制为基础进行会计确认、计量和报告。",answer:"正确",explanation:"企业会计的确认、计量和报告应当以权责发生制为基础。政府预算会计采用收付实现制。"}
        ];
        
        // 经济法 100 题
        const economyQuestions = [
            {id:1,type:"单选",point:"会计法律制度",difficulty:"easy",text:"票据的付款期限最长不得超过？",options:{A:"3 个月",B:"6 个月",C:"9 个月",D:"1 年"},answer:"B",explanation:"票据的付款期限最长不得超过 6 个月。"},
            {id:2,type:"单选",point:"支付结算",difficulty:"easy",text:"下列不属于票据基本当事人的是？",options:{A:"出票人",B:"收款人",C:"付款人",D:"背书人"},answer:"D",explanation:"票据基本当事人包括：出票人、收款人、付款人。背书人是非基本当事人。"},
            {id:3,type:"单选",point:"劳动合同",difficulty:"medium",text:"合同生效后，当事人对合同条款理解有争议的，应当？",options:{A:"按合同字面意思理解",B:"按交易习惯确定",C:"由法院判决",D:"视为合同无效"},answer:"B",explanation:"合同生效后，当事人对合同条款理解有争议的，应当按照合同所使用的词句、合同的相关条款、交易习惯等确定。"},
            {id:4,type:"判断",point:"劳动合同",difficulty:"medium",text:"要约可以撤回，但不得撤销。",answer:"错误",explanation:"要约可以撤回，也可以撤销。但要约人确定了承诺期限或者以其他方式明示不可撤销的，不得撤销。"},
            {id:5,type:"多选",point:"会计法律制度",difficulty:"medium",text:"公司解散的原因包括？",options:{A:"公司章程规定的营业期限届满",B:"股东会决议解散",C:"依法被吊销营业执照",D:"公司合并或分立"},answer:"ABCD",explanation:"公司解散的原因包括：公司章程规定的营业期限届满、股东会决议解散、依法被吊销营业执照、公司合并或分立等。"},
            {id:6,type:"单选",point:"支付结算",difficulty:"easy",text:"银行汇票的提示付款期限为？",options:{A:"10 天",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"B",explanation:"银行汇票的提示付款期限为 1 个月。"},
            {id:7,type:"单选",point:"支付结算",difficulty:"medium",text:"下列关于支票的说法正确的是？",options:{A:"支票可以透支",B:"支票的付款人是银行",C:"支票没有金额限制",D:"支票可以背书转让多次"},answer:"B",explanation:"支票的付款人必须是银行。支票不得透支，有金额起点限制。"},
            {id:8,type:"判断",point:"增值税",difficulty:"easy",text:"小规模纳税人可以自行开具增值税专用发票。",answer:"错误",explanation:"小规模纳税人不能自行开具增值税专用发票，需要向税务机关申请代开。"},
            {id:9,type:"多选",point:"所得税",difficulty:"medium",text:"下列各项中，不得在企业所得税前扣除的有？",options:{A:"税收滞纳金",B:"赞助支出",C:"工资薪金",D:"罚款支出"},answer:"ABD",explanation:"税收滞纳金、赞助支出、罚款支出不得在企业所得税前扣除。工资薪金可以按规定扣除。"},
            {id:10,type:"单选",point:"会计法律制度",difficulty:"easy",text:"伪造会计凭证、会计账簿，情节严重的，会计人员几年内不得从事会计工作？",options:{A:"3 年",B:"5 年",C:"10 年",D:"终身"},answer:"B",explanation:"伪造会计凭证、会计账簿，情节严重的，会计人员 5 年内不得从事会计工作。"},
            {id:11,type:"单选",point:"支付结算",difficulty:"medium",text:"商业汇票的承兑期限最长不得超过？",options:{A:"3 个月",B:"6 个月",C:"9 个月",D:"1 年"},answer:"B",explanation:"商业汇票的承兑期限最长不得超过 6 个月。"},
            {id:12,type:"单选",point:"劳动合同",difficulty:"medium",text:"下列合同中，属于无效合同的是？",options:{A:"一方以欺诈手段订立的合同",B:"恶意串通损害国家利益的合同",C:"重大误解订立的合同",D:"显失公平的合同"},answer:"B",explanation:"恶意串通损害国家、集体或第三人利益的合同属于无效合同。其他三项属于可撤销合同。"},
            {id:13,type:"判断",point:"会计法律制度",difficulty:"easy",text:"有限责任公司的股东以其认缴的出资额为限对公司承担责任。",answer:"正确",explanation:"有限责任公司股东以其认缴的出资额为限对公司承担责任；股份有限公司股东以其认购的股份为限对公司承担责任。"},
            {id:14,type:"多选",point:"支付结算",difficulty:"medium",text:"下列属于支付结算方式的有？",options:{A:"票据",B:"银行卡",C:"汇兑",D:"托收承付"},answer:"ABCD",explanation:"支付结算方式包括：票据、银行卡、汇兑、托收承付、委托收款、电子支付等。"},
            {id:15,type:"单选",point:"增值税",difficulty:"easy",text:"增值税小规模纳税人的征收率为？",options:{A:"3%",B:"6%",C:"9%",D:"13%"},answer:"A",explanation:"增值税小规模纳税人征收率为 3%（疫情期间有优惠政策）。"},
            {id:16,type:"单选",point:"所得税",difficulty:"easy",text:"企业所得税的法定税率为？",options:{A:"15%",B:"20%",C:"25%",D:"30%"},answer:"C",explanation:"企业所得税法定税率为 25%。符合条件的小型微利企业适用 20% 税率。"},
            {id:17,type:"判断",point:"会计法律制度",difficulty:"easy",text:"会计档案的保管期限分为永久和定期两类。",answer:"正确",explanation:"会计档案保管期限分为永久和定期两类，定期保管期限一般分为 10 年和 30 年。"},
            {id:18,type:"多选",point:"支付结算",difficulty:"medium",text:"下列各项中，属于票据行为的有？",options:{A:"出票",B:"背书",C:"承兑",D:"保证"},answer:"ABCD",explanation:"票据行为包括：出票、背书、承兑、保证。"},
            {id:19,type:"单选",point:"劳动合同",difficulty:"medium",text:"当事人一方不履行合同义务，应当承担的违约责任不包括？",options:{A:"继续履行",B:"采取补救措施",C:"赔偿损失",D:"支付定金"},answer:"D",explanation:"违约责任包括：继续履行、采取补救措施、赔偿损失、支付违约金等。支付定金不是违约责任形式。"},
            {id:20,type:"判断",point:"会计法律制度",difficulty:"medium",text:"一人有限责任公司的股东不能证明公司财产独立于股东自己财产的，应当对公司债务承担连带责任。",answer:"正确",explanation:"一人有限责任公司股东不能证明公司财产独立的，适用\"法人人格否认\"制度，对公司债务承担连带责任。"},
            {id:21,type:"单选",point:"增值税",difficulty:"medium",text:"下列各项中，不属于增值税征税范围的是？",options:{A:"销售货物",B:"提供加工修理修配劳务",C:"销售服务",D:"转让土地使用权"},answer:"D",explanation:"转让土地使用权属于营业税征税范围（营改增前）。营改增后销售无形资产属于增值税征税范围。"},
            {id:22,type:"单选",point:"支付结算",difficulty:"medium",text:"单位人民币卡账户的资金一律从其什么转账存入？",options:{A:"基本存款账户",B:"一般存款账户",C:"专用存款账户",D:"临时存款账户"},answer:"A",explanation:"单位人民币卡账户的资金一律从其基本存款账户转账存入，不得存取现金。"},
            {id:23,type:"多选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，属于会计职业道德内容的有？",options:{A:"爱岗敬业",B:"诚实守信",C:"廉洁自律",D:"客观公正"},answer:"ABCD",explanation:"会计职业道德包括：爱岗敬业、诚实守信、廉洁自律、客观公正、坚持准则、提高技能、参与管理、强化服务。"},
            {id:24,type:"判断",point:"劳动合同",difficulty:"medium",text:"格式条款与非格式条款不一致的，应当采用非格式条款。",answer:"正确",explanation:"格式条款与非格式条款不一致的，应当采用非格式条款，这是保护弱势一方利益的原则。"},
            {id:25,type:"单选",point:"会计法律制度",difficulty:"medium",text:"有限责任公司股东会作出修改公司章程的决议，必须经代表多少表决权的股东通过？",options:{A:"1/2 以上",B:"2/3 以上",C:"3/4 以上",D:"全体"},answer:"B",explanation:"修改公司章程、增减注册资本、合并分立解散等重大事项，必须经代表 2/3 以上表决权的股东通过。"},
            {id:26,type:"单选",point:"支付结算",difficulty:"medium",text:"银行本票的提示付款期限自出票日起最长不得超过？",options:{A:"10 天",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"C",explanation:"银行本票的提示付款期限自出票日起最长不得超过 2 个月。"},
            {id:27,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，适用 9% 增值税税率的有？",options:{A:"销售不动产",B:"转让土地使用权",C:"提供交通运输服务",D:"提供现代服务"},answer:"ABC",explanation:"9% 税率适用于：交通运输、邮政、基础电信、建筑、不动产租赁、销售不动产、转让土地使用权等。现代服务适用 6%。"},
            {id:28,type:"判断",point:"所得税",difficulty:"medium",text:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予扣除。",answer:"正确",explanation:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予在企业所得税前扣除。"},
            {id:29,type:"单选",point:"会计法律制度",difficulty:"medium",text:"担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作几年以上经历？",options:{A:"1 年",B:"2 年",C:"3 年",D:"5 年"},answer:"C",explanation:"担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作 3 年以上经历。"},
            {id:30,type:"多选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，属于股份有限公司设立方式的有？",options:{A:"发起设立",B:"募集设立",C:"独资设立",D:"合伙设立"},answer:"AB",explanation:"股份有限公司的设立方式包括发起设立和募集设立两种。"},
            {id:31,type:"判断",point:"支付结算",difficulty:"easy",text:"票据金额以中文大写和数码同时记载，二者必须一致，二者不一致的，票据无效。",answer:"正确",explanation:"票据金额以中文大写和数码同时记载，二者必须一致，二者不一致的，票据无效。"},
            {id:32,type:"单选",point:"劳动合同",difficulty:"medium",text:"当事人采用合同书形式订立合同的，自何时合同成立？",options:{A:"签字时",B:"盖章时",C:"签字或者盖章时",D:"交付时"},answer:"C",explanation:"当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立。"},
            {id:33,type:"多选",point:"支付结算",difficulty:"hard",text:"下列各项中，属于一般存款账户使用范围的有？",options:{A:"借款转存",B:"借款归还",C:"现金缴存",D:"现金支取"},answer:"ABC",explanation:"一般存款账户用于办理借款转存、借款归还、现金缴存，但不得办理现金支取。"},
            {id:34,type:"判断",point:"增值税",difficulty:"medium",text:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算不同税率货物或者应税劳务的销售额。",answer:"正确",explanation:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算；未分别核算的，从高适用税率。"},
            {id:35,type:"单选",point:"所得税",difficulty:"medium",text:"下列各项中，属于企业所得税免税收入的有？",options:{A:"国债利息收入",B:"符合条件的股息、红利",C:"财政拨款",D:"行政事业性收费"},answer:"A",explanation:"国债利息收入属于免税收入。财政拨款和行政事业性收费属于不征税收入。"},
            {id:36,type:"多选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，属于会计监督体系的有？",options:{A:"单位内部会计监督",B:"政府监督",C:"社会监督",D:"舆论监督"},answer:"ABC",explanation:"会计监督体系包括：单位内部会计监督、政府监督、社会监督三位一体。"},
            {id:37,type:"判断",point:"会计法律制度",difficulty:"medium",text:"股份有限公司董事会成员中可以有公司职工代表。",answer:"正确",explanation:"股份有限公司董事会成员中可以有公司职工代表。有限责任公司董事会成员中应当有公司职工代表。"},
            {id:38,type:"单选",point:"支付结算",difficulty:"hard",text:"汇票的保证人未记载被保证人名称的，已承兑的汇票，谁为被保证人？",options:{A:"出票人",B:"承兑人",C:"付款人",D:"背书人"},answer:"B",explanation:"保证人未记载被保证人名称的，已承兑的汇票，承兑人为被保证人；未承兑的汇票，出票人为被保证人。"},
            {id:39,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，属于合同权利义务终止情形的有？",options:{A:"债务已经按照约定履行",B:"合同解除",C:"债务相互抵销",D:"债务人依法将标的物提存"},answer:"ABCD",explanation:"合同权利义务终止的情形包括：履行、解除、抵销、提存、免除、混同等。"},
            {id:40,type:"判断",point:"支付结算",difficulty:"easy",text:"票据的出票日期必须使用中文大写。",answer:"正确",explanation:"票据的出票日期必须使用中文大写，为防止变造票据的出票日期。"},
            {id:41,type:"单选",point:"增值税",difficulty:"medium",text:"纳税人销售货物，增值税纳税义务发生时间为？",options:{A:"收讫销售款项当天",B:"取得索取销售款项凭据当天",C:"开具发票当天",D:"以上都是"},answer:"D",explanation:"纳税人销售货物，纳税义务发生时间为收讫销售款项或取得索取销售款项凭据的当天；先开具发票的，为开具发票的当天。"},
            {id:42,type:"多选",point:"所得税",difficulty:"medium",text:"下列各项中，属于个人所得税综合所得的有？",options:{A:"工资薪金所得",B:"劳务报酬所得",C:"稿酬所得",D:"特许权使用费所得"},answer:"ABCD",explanation:"个人所得税综合所得包括：工资薪金所得、劳务报酬所得、稿酬所得、特许权使用费所得四项。"},
            {id:43,type:"判断",point:"会计法律制度",difficulty:"easy",text:"各单位应当根据会计业务的需要，设置会计机构，或者在有关机构中设置会计人员并指定会计主管人员。",answer:"正确",explanation:"各单位应当根据会计业务的需要，设置会计机构，或者在有关机构中设置会计人员并指定会计主管人员；不具备设置条件的，应当委托经批准设立从事会计代理记账业务的中介机构代理记账。"},
            {id:44,type:"单选",point:"会计法律制度",difficulty:"medium",text:"公司合并时，合并各方的债权、债务如何处理？",options:{A:"由合并后存续的公司承继",B:"由合并后新设的公司承继",C:"A 或 B",D:"自行消灭"},answer:"C",explanation:"公司合并时，合并各方的债权、债务，应当由合并后存续的公司或者新设的公司承继。"},
            {id:45,type:"多选",point:"支付结算",difficulty:"hard",text:"下列各项中，属于汇票绝对记载事项的有？",options:{A:"表明\"汇票\"的字样",B:"无条件支付的委托",C:"确定的金额",D:"付款人名称"},answer:"ABCD",explanation:"汇票绝对记载事项包括：表明\"汇票\"的字样、无条件支付的委托、确定的金额、付款人名称、收款人名称、出票日期、出票人签章。"},
            {id:46,type:"判断",point:"劳动合同",difficulty:"medium",text:"当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款。",answer:"正确",explanation:"当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款，但二者不能并用。"},
            {id:47,type:"单选",point:"支付结算",difficulty:"medium",text:"临时存款账户的有效期最长不得超过？",options:{A:"6 个月",B:"1 年",C:"2 年",D:"3 年"},answer:"C",explanation:"临时存款账户的有效期最长不得超过 2 年。"},
            {id:48,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，属于增值税视同销售行为的有？",options:{A:"将自产货物用于集体福利",B:"将外购货物用于个人消费",C:"将自产货物无偿赠送他人",D:"将委托加工货物用于投资"},answer:"ACD",explanation:"将自产、委托加工的货物用于集体福利、个人消费、无偿赠送、投资等，视同销售。外购货物用于集体福利、个人消费不视同销售。"},
            {id:49,type:"判断",point:"所得税",difficulty:"medium",text:"个体工商户业主的工资薪金支出，不得在个人所得税前扣除。",answer:"正确",explanation:"个体工商户业主的工资薪金支出不得在税前扣除，但可以扣除生计费（每月 5000 元）。"},
            {id:50,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，不属于会计工作岗位的是？",options:{A:"出纳",B:"稽核",C:"会计机构负责人",D:"审计"},answer:"D",explanation:"审计岗位不属于会计工作岗位。会计工作岗位包括：出纳、稽核、资本基金核算、收入支出核算、债权债务核算等。"},
            {id:51,type:"单选",point:"支付结算",difficulty:"hard",text:"下列各项中，不属于票据权利的是？",options:{A:"付款请求权",B:"追索权",C:"利益返还请求权",D:"票据抗辩权"},answer:"D",explanation:"票据权利包括付款请求权和追索权。利益返还请求权是票据权利丧失后的民事权利。票据抗辩权是票据债务人的权利。"},
            {id:52,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，属于增值税进项税额不得抵扣的有？",options:{A:"用于简易计税方法计税项目",B:"用于免征增值税项目",C:"用于集体福利",D:"非正常损失的购进货物"},answer:"ABCD",explanation:"用于简易计税方法计税项目、免征增值税项目、集体福利或者个人消费的购进货物，以及非正常损失的购进货物，其进项税额不得抵扣。"},
            {id:53,type:"判断",point:"会计法律制度",difficulty:"medium",text:"会计机构负责人办理交接手续，由单位负责人监交。",answer:"正确",explanation:"会计机构负责人（会计主管人员）办理交接手续，由单位负责人监交，必要时主管单位可以派人会同监交。"},
            {id:54,type:"单选",point:"劳动合同",difficulty:"hard",text:"劳动者在试用期的工资不得低于本单位相同岗位最低档工资或者劳动合同约定工资的？",options:{A:"50%",B:"60%",C:"80%",D:"90%"},answer:"C",explanation:"劳动者在试用期的工资不得低于本单位相同岗位最低档工资或者劳动合同约定工资的 80%，并不得低于用人单位所在地的最低工资标准。"},
            {id:55,type:"多选",point:"所得税",difficulty:"hard",text:"下列各项中，属于个人所得税专项附加扣除的有？",options:{A:"子女教育",B:"继续教育",C:"住房贷款利息",D:"赡养老人"},answer:"ABCD",explanation:"个人所得税专项附加扣除包括：子女教育、继续教育、大病医疗、住房贷款利息或者住房租金、赡养老人等六项。"},
            {id:56,type:"判断",point:"支付结算",difficulty:"medium",text:"银行承兑汇票的承兑银行，应按票面金额向出票人收取万分之五的手续费。",answer:"正确",explanation:"银行承兑汇票的承兑银行，应按票面金额向出票人收取万分之五的手续费。"},
            {id:57,type:"单选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于会计行政法规的是？",options:{A:"《会计法》",B:"《企业财务会计报告条例》",C:"《企业会计准则》",D:"《会计基础工作规范》"},answer:"B",explanation:"《企业财务会计报告条例》属于会计行政法规。《会计法》属于会计法律，《企业会计准则》和《会计基础工作规范》属于会计部门规章。"},
            {id:58,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，用人单位可以解除劳动合同的情形有？",options:{A:"劳动者在试用期间被证明不符合录用条件",B:"劳动者严重违反用人单位的规章制度",C:"劳动者严重失职，营私舞弊，给用人单位造成重大损害",D:"劳动者被依法追究刑事责任"},answer:"ABCD",explanation:"用人单位可以单方解除劳动合同的情形包括：试用期不符合录用条件、严重违反规章制度、严重失职营私舞弊造成重大损害、被追究刑事责任等。"},
            {id:59,type:"单选",point:"增值税",difficulty:"hard",text:"纳税人购进农产品，取得一般纳税人开具的增值税专用发票，按照发票上注明的税额抵扣；取得小规模纳税人开具的增值税专用发票，按照？",options:{A:"1%",B:"3%",C:"9%",D:"10%"},answer:"B",explanation:"纳税人购进农产品，取得小规模纳税人开具的增值税专用发票，按照发票上注明的征收率 3% 计算抵扣进项税额。"},
            {id:60,type:"判断",point:"会计法律制度",difficulty:"medium",text:"总会计师是单位行政领导成员，协助单位主要行政领导人工作，直接对单位主要行政领导人负责。",answer:"正确",explanation:"总会计师是单位行政领导成员，协助单位主要行政领导人工作，直接对单位主要行政领导人负责。"},
            {id:61,type:"单选",point:"支付结算",difficulty:"hard",text:"下列各项中，支票的出票人不得签发？",options:{A:"现金支票",B:"转账支票",C:"空头支票",D:"普通支票"},answer:"C",explanation:"支票的出票人不得签发空头支票（签发金额超过其付款时在付款人处实有的存款金额的支票）。"},
            {id:62,type:"多选",point:"所得税",difficulty:"hard",text:"下列各项中，属于企业所得税税前加计扣除项目的有？",options:{A:"研发费用",B:"安置残疾人员工资",C:"广告费",D:"业务招待费"},answer:"AB",explanation:"研发费用可以加计扣除 75% 或 100%。安置残疾人员工资可以加计扣除 100%。广告费和业务招待费按限额扣除，不加计扣除。"},
            {id:63,type:"判断",point:"劳动合同",difficulty:"medium",text:"用人单位自用工之日起超过 1 个月不满 1 年未与劳动者订立书面劳动合同的，应当向劳动者每月支付 2 倍的工资。",answer:"正确",explanation:"用人单位自用工之日起超过 1 个月不满 1 年未与劳动者订立书面劳动合同的，应当向劳动者每月支付 2 倍的工资。"},
            {id:64,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，不属于支付结算原则的是？",options:{A:"恪守信用，履约付款",B:"谁的钱进谁的账，由谁支配",C:"银行不垫款",D:"及时清偿"},answer:"D",explanation:"支付结算的原则包括：恪守信用履约付款、谁的钱进谁的账由谁支配、银行不垫款。"},
            {id:65,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，属于增值税混合销售的有？",options:{A:"销售设备并负责安装",B:"销售汽车并负责装饰",C:"餐饮服务同时销售酒水",D:"商场销售商品同时提供餐饮服务"},answer:"ABC",explanation:"混合销售是指一项销售行为既涉及货物又涉及服务。商场销售商品同时提供餐饮服务属于兼营，不属于混合销售。"},
            {id:66,type:"判断",point:"支付结算",difficulty:"medium",text:"持票人提示付款期限自出票日起 10 日内提示付款的支票，付款人应当付款。",answer:"正确",explanation:"支票的持票人应当自出票日起 10 日内提示付款，付款人应当付款。"},
            {id:67,type:"单选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于税收违法行政行为的是？",options:{A:"偷税",B:"欠税",C:"骗税",D:"以上都是"},answer:"D",explanation:"税收违法行为包括偷税、欠税、骗税、抗税等。"},
            {id:68,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，属于劳动者可以立即解除劳动合同的情形有？",options:{A:"用人单位以暴力手段强迫劳动",B:"用人单位违章指挥危及劳动者人身安全",C:"用人单位未及时足额支付劳动报酬",D:"用人单位未依法缴纳社会保险费"},answer:"AB",explanation:"劳动者可以立即解除劳动合同的情形包括：用人单位以暴力、威胁或者非法限制人身自由的手段强迫劳动，用人单位违章指挥、强令冒险作业危及劳动者人身安全。其他两项需要提前通知解除。"},
            {id:69,type:"单选",point:"所得税",difficulty:"hard",text:"企业购置并实际使用《环境保护专用设备企业所得税优惠目录》规定的环境保护专用设备的，该专用设备投资额的？可以从企业当年的应纳税额中抵免。",options:{A:"10%",B:"20%",C:"30%",D:"50%"},answer:"A",explanation:"企业购置并实际使用环境保护、节能节水、安全生产等专用设备的，该专用设备投资额的 10% 可以从企业当年的应纳税额中抵免。"},
            {id:70,type:"判断",point:"会计法律制度",difficulty:"medium",text:"票据出票人在票据上的签章不符合规定的，票据无效。",answer:"正确",explanation:"票据出票人在票据上的签章不符合规定的，票据无效。背书人、承兑人、保证人签章不符合规定的，其签章无效，但不影响票据效力。"},
            {id:71,type:"单选",point:"增值税",difficulty:"hard",text:"纳税人发生应税销售行为，开具增值税专用发票后，发生开票有误或者销售折让、中止、退回等情形的，应当？",options:{A:"重新开具",B:"作废重开",C:"开具红字专用发票",D:"不予处理"},answer:"C",explanation:"开具增值税专用发票后，发生开票有误或者销售折让、中止、退回等情形的，应当按照规定开具红字增值税专用发票。"},
            {id:72,type:"多选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于单位内部会计监督制度要求的有？",options:{A:"记账人员与经济业务事项和会计事项的审批人员、经办人员、财物保管人员的职责权限应当明确",B:"重大对外投资、资产处置、资金调度和其他重要经济业务事项的决策和执行的相互监督、相互制约程序应当明确",C:"财产清查的范围、期限和组织程序应当明确",D:"对会计资料定期进行内部审计的办法和程序应当明确"},answer:"ABCD",explanation:"单位内部会计监督制度的要求包括：职责权限明确、重要经济业务事项决策和执行相互监督制约、财产清查明确、内部审计明确等。"},
            {id:73,type:"判断",point:"劳动合同",difficulty:"medium",text:"劳动者提前 30 日以书面形式通知用人单位，可以解除劳动合同。",answer:"正确",explanation:"劳动者提前 30 日以书面形式通知用人单位，可以解除劳动合同。劳动者在试用期内提前 3 日通知用人单位，可以解除劳动合同。"},
            {id:74,type:"单选",point:"支付结算",difficulty:"hard",text:"下列各项中，不属于银行汇票必须记载事项的是？",options:{A:"表明\"银行汇票\"的字样",B:"无条件支付的承诺",C:"付款日期",D:"出票金额"},answer:"C",explanation:"银行汇票必须记载事项包括：表明\"银行汇票\"的字样、无条件支付的承诺、出票金额、付款人名称、收款人名称、出票日期、出票人签章。付款日期不是必须记载事项。"},
            {id:75,type:"多选",point:"所得税",difficulty:"hard",text:"下列各项中，属于个人所得税居民纳税人的有？",options:{A:"在中国境内有住所的个人",B:"在中国境内无住所而一个纳税年度内在中国境内居住累计满 183 天的个人",C:"在中国境内无住所且居住不满 183 天的个人",D:"在中国境内有住所但境外工作的个人"},answer:"ABD",explanation:"个人所得税居民纳税人包括：在中国境内有住所的个人，以及在中国境内无住所而一个纳税年度内在中国境内居住累计满 183 天的个人。"},
            {id:76,type:"判断",point:"会计法律制度",difficulty:"medium",text:"会计专业技术资格分为初级资格、中级资格和高级资格三个级别。",answer:"正确",explanation:"会计专业技术资格分为初级资格、中级资格和高级资格三个级别。初级、中级会计资格的取得实行全国统一考试制度，高级会计师资格实行考试与评审相结合制度。"},
            {id:77,type:"单选",point:"增值税",difficulty:"hard",text:"纳税人进口货物，按照组成计税价格和规定的税率计算应纳税额。组成计税价格的计算公式是？",options:{A:"关税完税价格 + 关税",B:"关税完税价格 + 关税 + 消费税",C:"关税完税价格×(1+ 关税税率)",D:"关税完税价格×(1+ 消费税税率)"},answer:"B",explanation:"进口货物组成计税价格=关税完税价格 + 关税 + 消费税。如果进口的货物不属于消费税征税范围，则组成计税价格=关税完税价格 + 关税。"},
            {id:78,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，属于用人单位应当向劳动者支付经济补偿的情形有？",options:{A:"劳动者依照《劳动合同法》第 38 条规定解除劳动合同",B:"用人单位依照《劳动合同法》第 36 条规定向劳动者提出解除劳动合同并与劳动者协商一致解除劳动合同",C:"用人单位依照《劳动合同法》第 40 条规定解除劳动合同",D:"用人单位依照《劳动合同法》第 41 条第 1 款规定解除劳动合同"},answer:"ABCD",explanation:"用人单位应当支付经济补偿的情形包括：劳动者被迫解除、用人单位提出协商解除、无过失性辞退、经济性裁员等。"},
            {id:79,type:"判断",point:"支付结算",difficulty:"medium",text:"商业承兑汇票可以由付款人签发并承兑，也可以由收款人签发交由付款人承兑。",answer:"正确",explanation:"商业承兑汇票可以由付款人签发并承兑，也可以由收款人签发交由付款人承兑。银行承兑汇票应由在承兑银行开立存款账户的存款人签发。"},
            {id:80,type:"单选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，不属于税收征收管理范围的是？",options:{A:"税务登记",B:"账簿凭证管理",C:"纳税申报",D:"会计核算"},answer:"D",explanation:"税收征收管理包括税务登记、账簿凭证管理、纳税申报、税款征收、税务检查等。会计核算属于会计管理范围。"},
            {id:81,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，适用 6% 增值税税率的有？",options:{A:"金融服务",B:"现代服务",C:"生活服务",D:"增值电信服务"},answer:"ABCD",explanation:"6% 税率适用于：金融服务、现代服务（除租赁服务外）、生活服务、增值电信服务等。"},
            {id:82,type:"判断",point:"所得税",difficulty:"medium",text:"企业纳税年度发生的亏损，准予向以后年度结转，用以后年度的所得弥补，但结转年限最长不得超过 5 年。",answer:"正确",explanation:"企业纳税年度发生的亏损，准予向以后年度结转，用以后年度的所得弥补，但结转年限最长不得超过 5 年。高新技术企业或科技型中小企业亏损结转年限为 10 年。"},
            {id:83,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，不属于发票基本联次的是？",options:{A:"存根联",B:"发票联",C:"记账联",D:"抵扣联"},answer:"D",explanation:"发票的基本联次为三联：第一联为存根联，第二联为发票联，第三联为记账联。抵扣联是增值税专用发票的附加联次。"},
            {id:84,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，属于劳动合同必备条款的有？",options:{A:"用人单位名称",B:"劳动者姓名",C:"劳动合同期限",D:"工作内容和工作地点"},answer:"ABCD",explanation:"劳动合同必备条款包括：用人单位名称住所法定代表人、劳动者姓名住址身份证号、劳动合同期限、工作内容和工作地点、工作时间和休息休假、劳动报酬、社会保险、劳动保护等。"},
            {id:85,type:"判断",point:"支付结算",difficulty:"medium",text:"持票人未按照规定期限提示付款的，丧失对出票人以外的前手的追索权。",answer:"正确",explanation:"持票人未按照规定期限提示付款的，在作出说明后，承兑人或者付款人仍应当继续对持票人承担付款责任，但丧失对出票人以外的前手的追索权。"},
            {id:86,type:"单选",point:"增值税",difficulty:"hard",text:"纳税人发生应税销售行为，按照销售额和规定的税率计算收取的增值税额，为？",options:{A:"进项税额",B:"销项税额",C:"应纳税额",D:"已纳税额"},answer:"B",explanation:"销项税额是指纳税人发生应税销售行为，按照销售额和规定的税率计算收取的增值税额。进项税额是指纳税人购进货物、劳务、服务、无形资产、不动产支付或者负担的增值税额。"},
            {id:87,type:"多选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于违反会计法律制度应承担的法律责任的有？",options:{A:"行政责任",B:"民事责任",C:"刑事责任",D:"违宪责任"},answer:"ABC",explanation:"违反会计法律制度应承担的法律责任包括：行政责任（行政处罚和行政处分）、民事责任和刑事责任。"},
            {id:88,type:"判断",point:"所得税",difficulty:"medium",text:"个人独资企业和合伙企业不缴纳企业所得税，其投资者缴纳个人所得税。",answer:"正确",explanation:"个人独资企业和合伙企业不缴纳企业所得税，其投资者按照\"经营所得\"项目缴纳个人所得税。"},
            {id:89,type:"单选",point:"劳动合同",difficulty:"hard",text:"下列各项中，不属于非全日制用工特点的是？",options:{A:"以小时计酬为主",B:"劳动者在同一用人单位一般平均每日工作时间不超过 4 小时",C:"每周工作时间累计不超过 24 小时",D:"双方当事人可以约定试用期"},answer:"D",explanation:"非全日制用工双方当事人不得约定试用期。其他三项都是非全日制用工的特点。"},
            {id:90,type:"多选",point:"支付结算",difficulty:"hard",text:"下列各项中，属于信用证业务的当事人的有？",options:{A:"开证申请人",B:"开证行",C:"通知行",D:"受益人"},answer:"ABCD",explanation:"信用证业务的当事人包括：开证申请人、开证行、通知行、受益人，还可以有议付行、保兑行、付款行等。"},
            {id:91,type:"判断",point:"会计法律制度",difficulty:"medium",text:"纳税人伪造、变造、隐匿、擅自销毁账簿、记账凭证，或者在账簿上多列支出或者不列、少列收入，属于偷税行为。",answer:"正确",explanation:"这是《税收征收管理法》规定的偷税行为的典型表现形式。"},
            {id:92,type:"单选",point:"增值税",difficulty:"hard",text:"下列各项中，不属于增值税免税项目的是？",options:{A:"农业生产者销售的自产农产品",B:"避孕药品和用具",C:"古旧图书",D:"销售自己使用过的物品"},answer:"D",explanation:"农业生产者销售的自产农产品、避孕药品和用具、古旧图书属于增值税免税项目。个人销售自己使用过的物品免征增值税，但单位销售自己使用过的物品不免税。"},
            {id:93,type:"多选",point:"劳动合同",difficulty:"hard",text:"下列各项中，属于劳务派遣用工特点的有？",options:{A:"用人单位与劳动者建立劳动关系",B:"用工单位实际使用劳动者",C:"只能在临时性、辅助性或者替代性的工作岗位上实施",D:"劳务派遣单位应当与被派遣劳动者订立 2 年以上的固定期限劳动合同"},answer:"ABCD",explanation:"劳务派遣的特点包括：用人单位与劳动者建立劳动关系、用工单位实际使用、只能在三性岗位上实施、应当订立 2 年以上固定期限劳动合同等。"},
            {id:94,type:"判断",point:"支付结算",difficulty:"hard",text:"电子银行承兑汇票由银行业金融机构、财务公司承兑。",answer:"正确",explanation:"电子银行承兑汇票由银行业金融机构、财务公司承兑。电子商业承兑汇票由金融机构以外的法人或其他组织承兑。"},
            {id:95,type:"单选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，不属于税务行政处罚的是？",options:{A:"罚款",B:"没收违法所得",C:"停止出口退税权",D:"加收滞纳金"},answer:"D",explanation:"税务行政处罚包括：罚款、没收违法所得、停止出口退税权等。加收滞纳金属于行政强制执行措施，不属于行政处罚。"},
            {id:96,type:"多选",point:"所得税",difficulty:"hard",text:"下列各项中，属于个人所得税免税项目的有？",options:{A:"省级人民政府颁发的教育方面的奖金",B:"国债和国家发行的金融债券利息",C:"按照国家统一规定发给的补贴、津贴",D:"保险赔款"},answer:"ABCD",explanation:"个人所得税免税项目包括：省级以上政府颁发的奖金、国债和国家发行的金融债券利息、按照国家统一规定发给的补贴津贴、保险赔款、军人的转业费复员费、退休工资等。"},
            {id:97,type:"判断",point:"增值税",difficulty:"hard",text:"纳税人适用一般计税方法计税的，因销售折让、中止或者退回而退还给购买方的增值税额，应当从当期的销项税额中扣减。",answer:"正确",explanation:"纳税人适用一般计税方法计税的，因销售折让、中止或者退回而退还给购买方的增值税额，应当从当期的销项税额中扣减；因销售折让、中止或者退回而收回的增值税额，应当从当期的进项税额中扣减。"},
            {id:98,type:"单选",point:"劳动合同",difficulty:"hard",text:"下列各项中，劳动者可以要求用人单位支付赔偿金的情形是？",options:{A:"用人单位违法解除劳动合同",B:"用人单位未及时足额支付劳动报酬",C:"用人单位未依法缴纳社会保险费",D:"用人单位的规章制度违反法律规定"},answer:"A",explanation:"用人单位违法解除或者终止劳动合同的，应当按照经济补偿标准的 2 倍向劳动者支付赔偿金。其他三项劳动者可以解除劳动合同并要求经济补偿。"},
            {id:99,type:"多选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于增值税专用发票必须记载事项的有？",options:{A:"购买方名称",B:"购买方纳税人识别号",C:"购买方地址、电话",D:"购买方开户行及账号"},answer:"ABCD",explanation:"增值税专用发票必须记载事项包括：购买方和销售方的名称、纳税人识别号、地址电话、开户行及账号，以及货物或应税劳务名称、规格型号、单位、数量、单价、金额、税率、税额等。"},
            {id:100,type:"判断",point:"支付结算",difficulty:"medium",text:"票据的取得，必须给付对价，即应当给付票据双方当事人认可的相对应的代价。",answer:"正确",explanation:"票据的取得必须给付对价。但因税收、继承、赠与可以依法无偿取得票据的，不受给付对价的限制。"}
        ];
        
        let userAnswers = { accounting: {}, economy: {} };
        let scores = { accounting: 0, economy: 0 };
        let answeredCount = { accounting: 0, economy: 0 };
        let wrongQuestions = { accounting: [], economy: [] };
        
        function renderQuestions(questions, containerId, subject) {
            const container = document.getElementById(containerId);
            container.innerHTML = questions.map((q, index) => `
                <div class="question-card" id="${subject}-q${index}" data-point="${q.point}">
                    <div class="question-header">
                        <span class="question-number">第${index + 1}题</span>
                        <span class="question-type">${q.type}</span>
                        <span class="difficulty ${q.difficulty}">${q.difficulty === 'easy' ? '简单' : q.difficulty === 'medium' ? '中等' : '困难'}</span>
                    </div>
                    <div class="knowledge-point">📌 ${q.point}</div>
                    <div class="question-text">${q.text}</div>
                    <ul class="options">${renderOptions(q, subject, index)}</ul>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="checkAnswer('${subject}', ${index})">✅ 提交答案</button>
                        <button class="btn btn-info" onclick="showExplanation('${subject}', ${index})" style="display:none;" id="${subject}-explain-btn${index}">📖 查看解析</button>
                    </div>
                    <div class="explanation" id="${subject}-explain${index}">
                        <h4>✅ 正确答案：${q.answer}</h4>
                        <p>${q.explanation}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function renderOptions(q, subject, index) {
            if (q.type === "判断") {
                return `<li class="option" onclick="selectOption('${subject}', ${index}, '正确', this)"><span class="option-label">✓</span><span>正确</span></li>
                        <li class="option" onclick="selectOption('${subject}', ${index}, '错误', this)"><span class="option-label">✗</span><span>错误</span></li>`;
            } else {
                return Object.entries(q.options).map(([key, value]) => 
                    `<li class="option" onclick="selectOption('${subject}', ${index}, '${key}', this)"><span class="option-label">${key}</span><span>${value}</span></li>`
                ).join('');
            }
        }
        
        function selectOption(subject, index, answer, element) {
            const container = document.getElementById(`${subject}-q${index}`);
            container.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            userAnswers[subject][index] = answer;
        }
        
        function checkAnswer(subject, index) {
            const userAnswer = userAnswers[subject][index];
            if (!userAnswer) { alert('请先选择一个答案！'); return; }
            
            const questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            const question = questions[index];
            const card = document.getElementById(`${subject}-q${index}`);
            const options = card.querySelectorAll('.option');
            
            options.forEach(opt => {
                const label = opt.querySelector('.option-label').textContent;
                if (label === question.answer) opt.classList.add('correct');
                else if (label === userAnswer && userAnswer !== question.answer) opt.classList.add('incorrect');
            });
            
            options.forEach(opt => opt.style.pointerEvents = 'none');
            document.getElementById(`${subject}-explain-btn${index}`).style.display = 'inline-block';
            updateScore(subject, index, userAnswer === question.answer);
            updateProgress(subject);
            updateStats();
        }
        
        function showExplanation(subject, index) {
            document.getElementById(`${subject}-explain${index}`).classList.toggle('show');
        }
        
        function updateScore(subject, index, correct) {
            if (correct && !userAnswers[subject][index + '_scored']) {
                scores[subject]++;
                userAnswers[subject][index + '_scored'] = true;
                updateTotalScore();
            } else if (!correct && !wrongQuestions[subject].includes(index)) {
                wrongQuestions[subject].push(index);
            }
        }
        
        function updateTotalScore() {
            document.getElementById('accounting-score').textContent = scores.accounting;
            document.getElementById('economy-score').textContent = scores.economy;
            document.getElementById('total-score').textContent = `${scores.accounting + scores.economy} / 200`;
            
            const total = scores.accounting + scores.economy;
            let level = '';
            if (total >= 180) level = '⭐ 优秀 (90%+)';
            else if (total >= 150) level = '✅ 良好 (75%+)';
            else if (total >= 120) level = '📖 合格 (60%+)';
            else level = '💪 需要加强 (<60%)';
            document.getElementById('score-level').textContent = level;
        }
        
        function updateProgress(subject) {
            const answered = Object.keys(userAnswers[subject]).filter(k => !k.includes('_scored')).length;
            const total = subject === 'accounting' ? 100 : 100;
            const percentage = (answered / total) * 100;
            document.getElementById(`${subject}-progress`).style.width = `${percentage}%`;
        }
        
        function updateStats() {
            const accAnswered = Object.keys(userAnswers.accounting).filter(k => !k.includes('_scored')).length;
            const ecoAnswered = Object.keys(userAnswers.economy).filter(k => !k.includes('_scored')).length;
            const totalAnswered = accAnswered + ecoAnswered;
            const totalCorrect = scores.accounting + scores.economy;
            const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            const remaining = 200 - totalAnswered;
            
            document.getElementById('total-answered').textContent = totalAnswered;
            document.getElementById('total-correct').textContent = totalCorrect;
            document.getElementById('accuracy-rate').textContent = accuracy + '%';
            document.getElementById('remaining').textContent = remaining;
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
        
        function filterQuestions(subject, point) {
            const cards = document.querySelectorAll(`#${subject}-questions .question-card`);
            cards.forEach(card => {
                if (point === 'all' || card.dataset.point === point) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        function startPractice(subject, mode) {
            let questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            
            if (mode === 'random10') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 10);
            } else if (mode === 'random20') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 20);
            } else if (mode === 'weak') {
                const wrongIds = wrongQuestions[subject];
                if (wrongIds.length === 0) {
                    alert('太棒了！还没有错题，先做全部练习吧！');
                    return;
                }
                questions = questions.filter((q, index) => wrongIds.includes(index));
            }
            
            renderQuestions(questions, `${subject}-questions`, subject);
            userAnswers[subject] = {};
            scores[subject] = 0;
            wrongQuestions[subject] = [];
            document.getElementById(`${subject}-progress`).style.width = '0%';
            updateStats();
            showSection(subject);
        }
        
        function resetAll() {
            userAnswers = { accounting: {}, economy: {} };
            scores = { accounting: 0, economy: 0 };
            wrongQuestions = { accounting: [], economy: [] };
            document.getElementById('accounting-progress').style.width = '0%';
            document.getElementById('economy-progress').style.width = '0%';
            updateTotalScore();
            updateStats();
            renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
            renderQuestions(economyQuestions, 'economy-questions', 'economy');
            showSection('accounting');
        }
        
        renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
        renderQuestions(economyQuestions, 'economy-questions', 'economy');
    </script>
</body>
</html>
