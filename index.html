<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计职称考试 - 练习自测系统（100 题完整版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #6c757d; }
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
        }
        .nav-tab {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s;
        }
        .nav-tab:hover { background: #e9ecef; }
        .nav-tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .question-type {
            background: #e9ecef;
            color: #6c757d;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #212529;
            margin-bottom: 20px;
        }
        .options { list-style: none; }
        .option {
            padding: 12px 20px;
            margin: 8px 0;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        .option:hover { border-color: #667eea; background: #f0f0ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option.correct { border-color: #28a745; background: #28a745; color: white; }
        .option.incorrect { border-color: #dc3545; background: #dc3545; color: white; }
        .option-label {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
        }
        .option.selected .option-label { background: white; color: #667eea; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .explanation {
            display: none;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }
        .explanation.show { display: block; }
        .explanation h4 { color: #2e7d32; margin-bottom: 10px; }
        .explanation p { color: #1b5e20; line-height: 1.6; }
        .score-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .score-number { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .score-level { font-size: 20px; opacity: 0.9; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .knowledge-point {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 13px;
            color: #856404;
            display: inline-block;
            margin-bottom: 10px;
        }
        .action-buttons { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .chapter-filter {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .chapter-filter select {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 14px;
            margin-right: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 22px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 初级会计职称考试</h1>
            <p>练习自测系统 - 2026 年复习资料（100 题完整版）</p>
            <div>
                <span class="badge">💰 会计实务 50 题</span>
                <span class="badge">⚖️ 经济法 50 题</span>
                <span class="badge">📝 单选 + 多选 + 判断</span>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="total-answered">0</div>
                <div class="stat-label">已答题</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="total-correct">0</div>
                <div class="stat-label">正确数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="accuracy-rate">0%</div>
                <div class="stat-label">正确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="remaining">100</div>
                <div class="stat-label">剩余题</div>
            </div>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('accounting')">💰 会计实务 (50 题)</button>
            <button class="nav-tab" onclick="showSection('economy')">⚖️ 经济法 (50 题)</button>
            <button class="nav-tab" onclick="showSection('summary')">📊 答题统计</button>
        </div>
        
        <div class="content">
            <div id="accounting" class="section active">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('accounting', 'all')">📝 全部练习</button>
                    <button class="btn btn-info" onclick="startPractice('accounting', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('accounting', 'random')">🎲 随机 10 题</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('accounting', this.value)">
                        <option value="all">全部章节</option>
                        <option value="会计要素">会计要素</option>
                        <option value="会计科目">会计科目</option>
                        <option value="借贷记账法">借贷记账法</option>
                        <option value="资产">资产</option>
                        <option value="负债">负债</option>
                        <option value="所有者权益">所有者权益</option>
                        <option value="收入费用">收入费用</option>
                        <option value="财务报表">财务报表</option>
                        <option value="会计凭证">会计凭证</option>
                        <option value="会计账簿">会计账簿</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="accounting-progress" style="width: 0%"></div></div>
                <div id="accounting-questions"></div>
            </div>
            
            <div id="economy" class="section">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('economy', 'all')">📝 全部练习</button>
                    <button class="btn btn-info" onclick="startPractice('economy', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('economy', 'random')">🎲 随机 10 题</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('economy', this.value)">
                        <option value="all">全部章节</option>
                        <option value="票据法">票据法</option>
                        <option value="合同法">合同法</option>
                        <option value="公司法">公司法</option>
                        <option value="支付结算">支付结算</option>
                        <option value="增值税">增值税</option>
                        <option value="所得税">所得税</option>
                        <option value="会计法律制度">会计法律制度</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="economy-progress" style="width: 0%"></div></div>
                <div id="economy-questions"></div>
            </div>
            
            <div id="summary" class="section">
                <div class="score-display">
                    <div>总得分</div>
                    <div class="score-number" id="total-score">0 / 100</div>
                    <div class="score-level" id="score-level">开始答题吧！</div>
                </div>
                <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #667eea;" id="accounting-score">0</div>
                        <div style="color: #6c757d;">会计实务</div>
                        <div style="font-size: 12px;">(50 题)</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #764ba2;" id="economy-score">0</div>
                        <div style="color: #6c757d;">经济法</div>
                        <div style="font-size: 12px;">(50 题)</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resetAll()">🔄 重新开始</button>
                    <button class="btn btn-success" onclick="showSection('accounting')">📝 继续练习</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 会计实务 50 题
        const accountingQuestions = [
            {id:1,type:"单选",point:"会计要素",text:"下列属于企业资产要素的是？",options:{A:"实收资本",B:"应付账款",C:"银行存款",D:"未分配利润"},answer:"C",explanation:"银行存款属于资产要素，实收资本和未分配利润属于所有者权益，应付账款属于负债。"},
            {id:2,type:"单选",point:"借贷记账法",text:"借贷记账法的记账规则是？",options:{A:"有借必有贷，借贷必相等",B:"借方增加，贷方减少",C:"资产在借方，负债在贷方",D:"收入增加记借方"},answer:"A",explanation:"借贷记账法的基本规则是：有借必有贷，借贷必相等。"},
            {id:3,type:"单选",point:"固定资产",text:"下列不属于固定资产折旧方法的是？",options:{A:"年限平均法",B:"工作量法",C:"年数总和法",D:"直接法"},answer:"D",explanation:"固定资产折旧方法包括：年限平均法、工作量法、双倍余额递减法、年数总和法等。"},
            {id:4,type:"单选",point:"会计科目",text:"\"管理费用\"科目属于什么类科目？",options:{A:"资产类",B:"负债类",C:"损益类",D:"成本类"},answer:"C",explanation:"管理费用属于损益类科目中的费用类科目。"},
            {id:5,type:"单选",point:"财务报表",text:"资产负债表反映的是企业在特定日期的？",options:{A:"经营成果",B:"现金流量",C:"财务状况",D:"所有者权益变动"},answer:"C",explanation:"资产负债表反映企业在某一特定日期的财务状况。"},
            {id:6,type:"单选",point:"财务报表",text:"利润表反映企业在一定期间的？",options:{A:"财务状况",B:"现金流量",C:"经营成果",D:"所有者权益变动"},answer:"C",explanation:"利润表反映企业在一定期间的经营成果。"},
            {id:7,type:"多选",point:"会计基本假设",text:"会计基本假设包括？",options:{A:"会计主体",B:"持续经营",C:"会计分期",D:"货币计量"},answer:"ABCD",explanation:"会计基本假设包括：会计主体、持续经营、会计分期、货币计量。"},
            {id:8,type:"多选",point:"货币资金",text:"下列属于货币资金的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"应收账款"},answer:"ABC",explanation:"货币资金包括：库存现金、银行存款、其他货币资金。应收账款属于债权资产。"},
            {id:9,type:"判断",point:"收入确认",text:"企业销售商品只要收到款项就可以确认收入。",answer:"错误",explanation:"收入确认需要同时满足五个条件：合同已签订、商品所有权转移、经济利益很可能流入、企业成本能够可靠计量。"},
            {id:10,type:"判断",point:"存货计价",text:"发出存货的计价方法一旦确定，不得变更。",answer:"错误",explanation:"发出存货的计价方法可以根据实际情况变更，但需要在会计报表中披露变更情况。"},
            {id:11,type:"单选",point:"资产",text:"下列各项中，属于流动资产的是？",options:{A:"固定资产",B:"无形资产",C:"存货",D:"长期股权投资"},answer:"C",explanation:"存货属于流动资产，固定资产、无形资产、长期股权投资属于非流动资产。"},
            {id:12,type:"单选",point:"负债",text:"下列各项中，属于流动负债的是？",options:{A:"长期借款",B:"应付债券",C:"应付账款",D:"长期应付款"},answer:"C",explanation:"应付账款属于流动负债，其他三项属于非流动负债。"},
            {id:13,type:"单选",point:"所有者权益",text:"下列各项中，不属于所有者权益的是？",options:{A:"实收资本",B:"资本公积",C:"盈余公积",D:"长期股权投资"},answer:"D",explanation:"长期股权投资属于资产，不属于所有者权益。"},
            {id:14,type:"多选",point:"收入",text:"下列各项中，属于收入的有？",options:{A:"销售商品收入",B:"提供劳务收入",C:"让渡资产使用权收入",D:"营业外收入"},answer:"ABC",explanation:"收入包括销售商品收入、提供劳务收入、让渡资产使用权收入。营业外收入不属于收入要素。"},
            {id:15,type:"单选",point:"会计等式",text:"最基本的会计等式是？",options:{A:"资产=负债 + 所有者权益",B:"收入 - 费用=利润",C:"资产=权益",D:"资产 + 费用=负债 + 所有者权益 + 收入"},answer:"A",explanation:"资产=负债 + 所有者权益是最基本的会计等式，也称为静态会计等式。"},
            {id:16,type:"判断",point:"会计科目",text:"\"累计折旧\"科目是资产类科目，但属于资产的备抵科目。",answer:"正确",explanation:"累计折旧是固定资产的备抵科目，借方登记减少，贷方登记增加，余额在贷方。"},
            {id:17,type:"单选",point:"资产",text:"企业购入不需要安装的设备一台，应借记的科目是？",options:{A:"在建工程",B:"固定资产",C:"制造费用",D:"管理费用"},answer:"B",explanation:"购入不需要安装的固定资产，直接借记\"固定资产\"科目。"},
            {id:18,type:"单选",point:"费用",text:"下列各项中，应计入产品成本的是？",options:{A:"管理费用",B:"销售费用",C:"财务费用",D:"制造费用"},answer:"D",explanation:"制造费用应计入产品成本，其他三项属于期间费用。"},
            {id:19,type:"多选",point:"会计凭证",text:"会计凭证按照填制程序和用途可分为？",options:{A:"原始凭证",B:"记账凭证",C:"收款凭证",D:"付款凭证"},answer:"AB",explanation:"会计凭证按填制程序和用途分为原始凭证和记账凭证。收款凭证和付款凭证是记账凭证的进一步分类。"},
            {id:20,type:"判断",point:"会计账簿",text:"总分类账和明细分类账必须平行登记。",answer:"正确",explanation:"总分类账和明细分类账平行登记要求：依据相同、方向相同、期间相同、金额相等。"},
            {id:21,type:"单选",point:"资产",text:"下列各项中，不应计入存货成本的是？",options:{A:"购买价款",B:"相关税费",C:"运输费",D:"非正常损耗"},answer:"D",explanation:"非正常损耗不计入存货成本，应计入当期损益。"},
            {id:22,type:"单选",point:"固定资产",text:"固定资产折旧应计入的科目是？",options:{A:"管理费用",B:"制造费用",C:"根据用途计入不同科目",D:"销售费用"},answer:"C",explanation:"固定资产折旧根据用途计入不同科目：管理部门用计入管理费用，生产车间用计入制造费用，销售部门用计入销售费用。"},
            {id:23,type:"多选",point:"财务报表",text:"下列属于财务报表的有？",options:{A:"资产负债表",B:"利润表",C:"现金流量表",D:"所有者权益变动表"},answer:"ABCD",explanation:"财务报表包括：资产负债表、利润表、现金流量表、所有者权益变动表及附注。"},
            {id:24,type:"判断",point:"会计信息质量",text:"会计信息质量要求中的可比性要求同一企业不同时期发生的相同交易应采用一致的会计政策。",answer:"正确",explanation:"可比性要求同一企业不同时期可比（纵向可比），不同企业相同会计期间可比（横向可比）。"},
            {id:25,type:"单选",point:"会计要素",text:"下列各项中，属于反映企业经营成果的会计要素是？",options:{A:"资产",B:"负债",C:"所有者权益",D:"利润"},answer:"D",explanation:"反映经营成果的会计要素包括：收入、费用、利润。资产、负债、所有者权益反映财务状况。"},
            {id:26,type:"单选",point:"资产",text:"应收账款的入账价值不包括？",options:{A:"销售商品价款",B:"增值税销项税额",C:"代垫运杂费",D:"商业折扣"},answer:"D",explanation:"商业折扣在销售时已扣除，不计入应收账款。应收账款包括价款、增值税、代垫费用等。"},
            {id:27,type:"多选",point:"资产",text:"下列各项中，应计入存货采购成本的有？",options:{A:"购买价款",B:"进口关税",C:"运输途中的合理损耗",D:"入库前的挑选整理费"},answer:"ABCD",explanation:"存货采购成本包括：购买价款、相关税费、运输费、装卸费、保险费、运输途中合理损耗、入库前挑选整理费等。"},
            {id:28,type:"判断",point:"资产",text:"交易性金融资产持有期间取得的现金股利应计入投资收益。",answer:"正确",explanation:"交易性金融资产持有期间，被投资单位宣告发放的现金股利，应确认为投资收益。"},
            {id:29,type:"单选",point:"负债",text:"下列各项中，应通过\"应付职工薪酬\"科目核算的是？",options:{A:"职工工资",B:"职工福利费",C:"社会保险费",D:"以上都是"},answer:"D",explanation:"应付职工薪酬核算企业应付给职工的各种薪酬，包括工资、福利费、社会保险费、住房公积金等。"},
            {id:30,type:"单选",point:"所有者权益",text:"下列各项中，不属于留存收益的是？",options:{A:"资本公积",B:"盈余公积",C:"未分配利润",D:"以上都不是"},answer:"A",explanation:"留存收益包括盈余公积和未分配利润。资本公积不属于留存收益。"},
            {id:31,type:"多选",point:"收入",text:"下列各项中，应确认为其他业务收入的有？",options:{A:"销售材料收入",B:"出租固定资产租金收入",C:"出售无形资产净收益",D:"出租包装物租金收入"},answer:"ABD",explanation:"其他业务收入包括销售材料、出租固定资产、出租包装物等。出售无形资产净收益计入资产处置损益。"},
            {id:32,type:"判断",point:"费用",text:"期间费用包括管理费用、销售费用和财务费用。",answer:"正确",explanation:"期间费用是指企业日常活动中不能直接归属于某个特定成本核算对象的费用，包括管理费用、销售费用和财务费用。"},
            {id:33,type:"单选",point:"财务报表",text:"下列各项中，属于资产负债表流动负债项目的是？",options:{A:"长期借款",B:"应付债券",C:"应付票据",D:"长期应付款"},answer:"C",explanation:"应付票据属于流动负债，其他三项属于非流动负债。"},
            {id:34,type:"多选",point:"财务报表",text:"下列各项中，属于利润表项目的有？",options:{A:"营业收入",B:"营业成本",C:"税金及附加",D:"销售费用"},answer:"ABCD",explanation:"利润表项目包括营业收入、营业成本、税金及附加、销售费用、管理费用、财务费用等。"},
            {id:35,type:"判断",point:"会计凭证",text:"原始凭证金额有错误的，应当由出具单位重开，不得在原始凭证上更正。",answer:"正确",explanation:"原始凭证金额有错误的，必须由出具单位重开，不得更正。其他内容错误可由出具单位更正并盖章。"},
            {id:36,type:"单选",point:"会计账簿",text:"下列各项中，应采用数量金额式账页格式的是？",options:{A:"库存现金日记账",B:"银行存款日记账",C:"原材料明细账",D:"管理费用明细账"},answer:"C",explanation:"原材料明细账应采用数量金额式，同时登记数量和金额。现金和银行存款日记账采用三栏式，管理费用明细账采用多栏式。"},
            {id:37,type:"多选",point:"资产",text:"下列各项中，应计提固定资产折旧的有？",options:{A:"季节性停用的设备",B:"已提足折旧继续使用的设备",C:"未使用的房屋",D:"经营租入的设备"},answer:"AC",explanation:"季节性停用和未使用的固定资产应计提折旧。已提足折旧继续使用和经营租入的设备不计提折旧。"},
            {id:38,type:"判断",point:"资产",text:"无形资产摊销一定计入管理费用。",answer:"错误",explanation:"无形资产摊销根据用途计入不同科目：管理用计入管理费用，生产用计入制造费用，出租用计入其他业务成本。"},
            {id:39,type:"单选",point:"负债",text:"下列各项中，不属于流动负债的是？",options:{A:"预收账款",B:"预付账款",C:"应付利息",D:"一年内到期的长期借款"},answer:"B",explanation:"预付账款属于资产，不属于负债。预收账款、应付利息、一年内到期的长期借款都属于流动负债。"},
            {id:40,type:"单选",point:"所有者权益",text:"下列各项中，会引起所有者权益总额发生增减变动的是？",options:{A:"盈余公积转增资本",B:"资本公积转增资本",C:"宣告发放现金股利",D:"盈余公积弥补亏损"},answer:"C",explanation:"宣告发放现金股利会减少未分配利润，从而减少所有者权益总额。其他三项是所有者权益内部结转，不影响总额。"},
            {id:41,type:"多选",point:"收入",text:"下列各项中，应计入营业外收入的有？",options:{A:"盘盈利得",B:"捐赠利得",C:"罚款收入",D:"确实无法支付的应付账款"},answer:"ABCD",explanation:"营业外收入包括盘盈利得、捐赠利得、罚款收入、无法支付的应付款项等非日常活动形成的利得。"},
            {id:42,type:"判断",point:"费用",text:"生产成本属于费用要素。",answer:"错误",explanation:"生产成本属于成本，不属于费用要素。费用包括期间费用（管理费用、销售费用、财务费用）。"},
            {id:43,type:"单选",point:"会计等式",text:"某企业资产总额为 100 万元，负债总额为 40 万元，则所有者权益总额为？",options:{A:"40 万元",B:"60 万元",C:"100 万元",D:"140 万元"},answer:"B",explanation:"根据会计等式：资产=负债 + 所有者权益，所有者权益=资产 - 负债=100-40=60 万元。"},
            {id:44,type:"多选",point:"会计科目",text:"下列各项中，属于损益类科目的有？",options:{A:"主营业务收入",B:"主营业务成本",C:"本年利润",D:"所得税费用"},answer:"ABD",explanation:"损益类科目包括收入类（主营业务收入等）、费用类（主营业务成本、所得税费用等）。本年利润属于所有者权益类科目。"},
            {id:45,type:"判断",point:"会计凭证",text:"记账凭证可以根据每一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制。",answer:"正确",explanation:"记账凭证可以根据一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制，还可以根据原始凭证汇总表填制。"},
            {id:46,type:"单选",point:"会计账簿",text:"下列各项中，适用于订本式账簿的是？",options:{A:"原材料明细账",B:"管理费用明细账",C:"库存现金日记账",D:"应收账款明细账"},answer:"C",explanation:"订本式账簿适用于总分类账、库存现金日记账、银行存款日记账等重要账簿。明细账一般采用活页式。"},
            {id:47,type:"多选",point:"资产",text:"下列各项中，属于其他应收款核算内容的有？",options:{A:"应收的各种赔款",B:"应收的出租包装物租金",C:"存出保证金",D:"代购货单位垫付的运杂费"},answer:"ABC",explanation:"其他应收款核算除应收票据、应收账款、预付账款等以外的各种应收、暂付款项。代购货单位垫付的运杂费计入应收账款。"},
            {id:48,type:"判断",point:"负债",text:"企业计提短期借款利息时，应借记\"财务费用\"科目，贷记\"应付利息\"科目。",answer:"正确",explanation:"短期借款利息属于筹资费用，计提时借记\"财务费用\"，贷记\"应付利息\"。"},
            {id:49,type:"单选",point:"所有者权益",text:"下列各项中，不属于资本公积来源的是？",options:{A:"资本溢价",B:"股本溢价",C:"直接计入所有者权益的利得",D:"留存收益"},answer:"D",explanation:"资本公积来源包括资本溢价、股本溢价、直接计入所有者权益的利得等。留存收益是独立的权益项目。"},
            {id:50,type:"多选",point:"财务报表",text:"下列各项中，属于现金流量表现金及现金等价物的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"三个月内到期的债券投资"},answer:"ABCD",explanation:"现金及现金等价物包括库存现金、银行存款、其他货币资金和三个月内到期的债券投资等。"}
        ];
        
        // 经济法 50 题
        const economyQuestions = [
            {id:1,type:"单选",point:"票据法",text:"票据的付款期限最长不得超过？",options:{A:"3 个月",B:"6 个月",C:"9 个月",D:"1 年"},answer:"B",explanation:"票据的付款期限最长不得超过 6 个月。"},
            {id:2,type:"单选",point:"票据法",text:"下列不属于票据基本当事人的是？",options:{A:"出票人",B:"收款人",C:"付款人",D:"背书人"},answer:"D",explanation:"票据基本当事人包括：出票人、收款人、付款人。背书人是非基本当事人。"},
            {id:3,type:"单选",point:"合同法",text:"合同生效后，当事人对合同条款理解有争议的，应当？",options:{A:"按合同字面意思理解",B:"按交易习惯确定",C:"由法院判决",D:"视为合同无效"},answer:"B",explanation:"合同生效后，当事人对合同条款理解有争议的，应当按照合同所使用的词句、合同的相关条款、交易习惯等确定。"},
            {id:4,type:"判断",point:"合同法",text:"要约可以撤回，但不得撤销。",answer:"错误",explanation:"要约可以撤回，也可以撤销。但要约人确定了承诺期限或者以其他方式明示不可撤销的，不得撤销。"},
            {id:5,type:"多选",point:"公司法",text:"公司解散的原因包括？",options:{A:"公司章程规定的营业期限届满",B:"股东会决议解散",C:"依法被吊销营业执照",D:"公司合并或分立"},answer:"ABCD",explanation:"公司解散的原因包括：公司章程规定的营业期限届满、股东会决议解散、依法被吊销营业执照、公司合并或分立等。"},
            {id:6,type:"单选",point:"支付结算",text:"银行汇票的提示付款期限为？",options:{A:"10 天",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"B",explanation:"银行汇票的提示付款期限为 1 个月。"},
            {id:7,type:"单选",point:"票据法",text:"下列关于支票的说法正确的是？",options:{A:"支票可以透支",B:"支票的付款人是银行",C:"支票没有金额限制",D:"支票可以背书转让多次"},answer:"B",explanation:"支票的付款人必须是银行。支票不得透支，有金额起点限制。"},
            {id:8,type:"判断",point:"增值税",text:"小规模纳税人可以自行开具增值税专用发票。",answer:"错误",explanation:"小规模纳税人不能自行开具增值税专用发票，需要向税务机关申请代开。"},
            {id:9,type:"多选",point:"所得税",text:"下列各项中，不得在企业所得税前扣除的有？",options:{A:"税收滞纳金",B:"赞助支出",C:"工资薪金",D:"罚款支出"},answer:"ABD",explanation:"税收滞纳金、赞助支出、罚款支出不得在企业所得税前扣除。工资薪金可以按规定扣除。"},
            {id:10,type:"单选",point:"会计法律制度",text:"伪造会计凭证、会计账簿，情节严重的，会计人员几年内不得从事会计工作？",options:{A:"3 年",B:"5 年",C:"10 年",D:"终身"},answer:"B",explanation:"伪造会计凭证、会计账簿，情节严重的，会计人员 5 年内不得从事会计工作。"},
            {id:11,type:"单选",point:"票据法",text:"商业汇票的承兑期限最长不得超过？",options:{A:"3 个月",B:"6 个月",C:"9 个月",D:"1 年"},answer:"B",explanation:"商业汇票的承兑期限最长不得超过 6 个月。"},
            {id:12,type:"单选",point:"合同法",text:"下列合同中，属于无效合同的是？",options:{A:"一方以欺诈手段订立的合同",B:"恶意串通损害国家利益的合同",C:"重大误解订立的合同",D:"显失公平的合同"},answer:"B",explanation:"恶意串通损害国家、集体或第三人利益的合同属于无效合同。其他三项属于可撤销合同。"},
            {id:13,type:"判断",point:"公司法",text:"有限责任公司的股东以其认缴的出资额为限对公司承担责任。",answer:"正确",explanation:"有限责任公司股东以其认缴的出资额为限对公司承担责任；股份有限公司股东以其认购的股份为限对公司承担责任。"},
            {id:14,type:"多选",point:"支付结算",text:"下列属于支付结算方式的有？",options:{A:"票据",B:"银行卡",C:"汇兑",D:"托收承付"},answer:"ABCD",explanation:"支付结算方式包括：票据、银行卡、汇兑、托收承付、委托收款、电子支付等。"},
            {id:15,type:"单选",point:"增值税",text:"增值税小规模纳税人的征收率为？",options:{A:"3%",B:"6%",C:"9%",D:"13%"},answer:"A",explanation:"增值税小规模纳税人征收率为 3%（疫情期间有优惠政策）。"},
            {id:16,type:"单选",point:"所得税",text:"企业所得税的法定税率为？",options:{A:"15%",B:"20%",C:"25%",D:"30%"},answer:"C",explanation:"企业所得税法定税率为 25%。符合条件的小型微利企业适用 20% 税率。"},
            {id:17,type:"判断",point:"会计法律制度",text:"会计档案的保管期限分为永久和定期两类。",answer:"正确",explanation:"会计档案保管期限分为永久和定期两类，定期保管期限一般分为 10 年和 30 年。"},
            {id:18,type:"多选",point:"票据法",text:"下列各项中，属于票据行为的有？",options:{A:"出票",B:"背书",C:"承兑",D:"保证"},answer:"ABCD",explanation:"票据行为包括：出票、背书、承兑、保证。"},
            {id:19,type:"单选",point:"合同法",text:"当事人一方不履行合同义务，应当承担的违约责任不包括？",options:{A:"继续履行",B:"采取补救措施",C:"赔偿损失",D:"支付定金"},answer:"D",explanation:"违约责任包括：继续履行、采取补救措施、赔偿损失、支付违约金等。支付定金不是违约责任形式。"},
            {id:20,type:"判断",point:"公司法",text:"一人有限责任公司的股东不能证明公司财产独立于股东自己财产的，应当对公司债务承担连带责任。",answer:"正确",explanation:"一人有限责任公司股东不能证明公司财产独立的，适用\"法人人格否认\"制度，对公司债务承担连带责任。"},
            {id:21,type:"单选",point:"增值税",text:"下列各项中，不属于增值税征税范围的是？",options:{A:"销售货物",B:"提供加工修理修配劳务",C:"销售服务",D:"转让土地使用权"},answer:"D",explanation:"转让土地使用权属于营业税征税范围（营改增前）。营改增后销售无形资产属于增值税征税范围。"},
            {id:22,type:"单选",point:"支付结算",text:"单位人民币卡账户的资金一律从其什么转账存入？",options:{A:"基本存款账户",B:"一般存款账户",C:"专用存款账户",D:"临时存款账户"},answer:"A",explanation:"单位人民币卡账户的资金一律从其基本存款账户转账存入，不得存取现金。"},
            {id:23,type:"多选",point:"会计法律制度",text:"下列各项中，属于会计职业道德内容的有？",options:{A:"爱岗敬业",B:"诚实守信",C:"廉洁自律",D:"客观公正"},answer:"ABCD",explanation:"会计职业道德包括：爱岗敬业、诚实守信、廉洁自律、客观公正、坚持准则、提高技能、参与管理、强化服务。"},
            {id:24,type:"判断",point:"合同法",text:"格式条款与非格式条款不一致的，应当采用非格式条款。",answer:"正确",explanation:"格式条款与非格式条款不一致的，应当采用非格式条款，这是保护弱势一方利益的原则。"},
            {id:25,type:"单选",point:"公司法",text:"有限责任公司股东会作出修改公司章程的决议，必须经代表多少表决权的股东通过？",options:{A:"1/2 以上",B:"2/3 以上",C:"3/4 以上",D:"全体"},answer:"B",explanation:"修改公司章程、增减注册资本、合并分立解散等重大事项，必须经代表 2/3 以上表决权的股东通过。"},
            {id:26,type:"单选",point:"票据法",text:"银行本票的提示付款期限自出票日起最长不得超过？",options:{A:"10 天",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"C",explanation:"银行本票的提示付款期限自出票日起最长不得超过 2 个月。"},
            {id:27,type:"多选",point:"增值税",text:"下列各项中，适用 9% 增值税税率的有？",options:{A:"销售不动产",B:"转让土地使用权",C:"提供交通运输服务",D:"提供现代服务"},answer:"ABC",explanation:"9% 税率适用于：交通运输、邮政、基础电信、建筑、不动产租赁、销售不动产、转让土地使用权等。现代服务适用 6%。"},
            {id:28,type:"判断",point:"所得税",text:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予扣除。",answer:"正确",explanation:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予在企业所得税前扣除。"},
            {id:29,type:"单选",point:"会计法律制度",text:"担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作几年以上经历？",options:{A:"1 年",B:"2 年",C:"3 年",D:"5 年"},answer:"C",explanation:"担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作 3 年以上经历。"},
            {id:30,type:"多选",point:"公司法",text:"下列各项中，属于股份有限公司设立方式的有？",options:{A:"发起设立",B:"募集设立",C:"独资设立",D:"合伙设立"},answer:"AB",explanation:"股份有限公司的设立方式包括发起设立和募集设立两种。"},
            {id:31,type:"判断",point:"票据法",text:"票据金额以中文大写和数码同时记载，二者必须一致，二者不一致的，票据无效。",answer:"正确",explanation:"票据金额以中文大写和数码同时记载，二者必须一致，二者不一致的，票据无效。"},
            {id:32,type:"单选",point:"合同法",text:"当事人采用合同书形式订立合同的，自何时合同成立？",options:{A:"签字时",B:"盖章时",C:"签字或者盖章时",D:"交付时"},answer:"C",explanation:"当事人采用合同书形式订立合同的，自当事人均签名、盖章或者按指印时合同成立。"},
            {id:33,type:"多选",point:"支付结算",text:"下列各项中，属于一般存款账户使用范围的有？",options:{A:"借款转存",B:"借款归还",C:"现金缴存",D:"现金支取"},answer:"ABC",explanation:"一般存款账户用于办理借款转存、借款归还、现金缴存，但不得办理现金支取。"},
            {id:34,type:"判断",point:"增值税",text:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算不同税率货物或者应税劳务的销售额。",answer:"正确",explanation:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算；未分别核算的，从高适用税率。"},
            {id:35,type:"单选",point:"所得税",text:"下列各项中，属于企业所得税免税收入的有？",options:{A:"国债利息收入",B:"符合条件的股息、红利",C:"财政拨款",D:"行政事业性收费"},answer:"A",explanation:"国债利息收入属于免税收入。财政拨款和行政事业性收费属于不征税收入。"},
            {id:36,type:"多选",point:"会计法律制度",text:"下列各项中，属于会计监督体系的有？",options:{A:"单位内部会计监督",B:"政府监督",C:"社会监督",D:"舆论监督"},answer:"ABC",explanation:"会计监督体系包括：单位内部会计监督、政府监督、社会监督三位一体。"},
            {id:37,type:"判断",point:"公司法",text:"股份有限公司董事会成员中可以有公司职工代表。",answer:"正确",explanation:"股份有限公司董事会成员中可以有公司职工代表。有限责任公司董事会成员中应当有公司职工代表。"},
            {id:38,type:"单选",point:"票据法",text:"汇票的保证人未记载被保证人名称的，已承兑的汇票，谁为被保证人？",options:{A:"出票人",B:"承兑人",C:"付款人",D:"背书人"},answer:"B",explanation:"保证人未记载被保证人名称的，已承兑的汇票，承兑人为被保证人；未承兑的汇票，出票人为被保证人。"},
            {id:39,type:"多选",point:"合同法",text:"下列各项中，属于合同权利义务终止情形的有？",options:{A:"债务已经按照约定履行",B:"合同解除",C:"债务相互抵销",D:"债务人依法将标的物提存"},answer:"ABCD",explanation:"合同权利义务终止的情形包括：履行、解除、抵销、提存、免除、混同等。"},
            {id:40,type:"判断",point:"支付结算",text:"票据的出票日期必须使用中文大写。",answer:"正确",explanation:"票据的出票日期必须使用中文大写，为防止变造票据的出票日期。"},
            {id:41,type:"单选",point:"增值税",text:"纳税人销售货物，增值税纳税义务发生时间为？",options:{A:"收讫销售款项当天",B:"取得索取销售款项凭据当天",C:"开具发票当天",D:"以上都是"},answer:"D",explanation:"纳税人销售货物，纳税义务发生时间为收讫销售款项或取得索取销售款项凭据的当天；先开具发票的，为开具发票的当天。"},
            {id:42,type:"多选",point:"所得税",text:"下列各项中，属于个人所得税综合所得的有？",options:{A:"工资薪金所得",B:"劳务报酬所得",C:"稿酬所得",D:"特许权使用费所得"},answer:"ABCD",explanation:"个人所得税综合所得包括：工资薪金所得、劳务报酬所得、稿酬所得、特许权使用费所得四项。"},
            {id:43,type:"判断",point:"会计法律制度",text:"各单位应当根据会计业务的需要，设置会计机构，或者在有关机构中设置会计人员并指定会计主管人员。",answer:"正确",explanation:"各单位应当根据会计业务的需要，设置会计机构，或者在有关机构中设置会计人员并指定会计主管人员；不具备设置条件的，应当委托经批准设立从事会计代理记账业务的中介机构代理记账。"},
            {id:44,type:"单选",point:"公司法",text:"公司合并时，合并各方的债权、债务如何处理？",options:{A:"由合并后存续的公司承继",B:"由合并后新设的公司承继",C:"A 或 B",D:"自行消灭"},answer:"C",explanation:"公司合并时，合并各方的债权、债务，应当由合并后存续的公司或者新设的公司承继。"},
            {id:45,type:"多选",point:"票据法",text:"下列各项中，属于汇票绝对记载事项的有？",options:{A:"表明\"汇票\"的字样",B:"无条件支付的委托",C:"确定的金额",D:"付款人名称"},answer:"ABCD",explanation:"汇票绝对记载事项包括：表明\"汇票\"的字样、无条件支付的委托、确定的金额、付款人名称、收款人名称、出票日期、出票人签章。"},
            {id:46,type:"判断",point:"合同法",text:"当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款。",answer:"正确",explanation:"当事人既约定违约金，又约定定金的，一方违约时，对方可以选择适用违约金或者定金条款，但二者不能并用。"},
            {id:47,type:"单选",point:"支付结算",text:"临时存款账户的有效期最长不得超过？",options:{A:"6 个月",B:"1 年",C:"2 年",D:"3 年"},answer:"C",explanation:"临时存款账户的有效期最长不得超过 2 年。"},
            {id:48,type:"多选",point:"增值税",text:"下列各项中，属于增值税视同销售行为的有？",options:{A:"将自产货物用于集体福利",B:"将外购货物用于个人消费",C:"将自产货物无偿赠送他人",D:"将委托加工货物用于投资"},answer:"ACD",explanation:"将自产、委托加工的货物用于集体福利、个人消费、无偿赠送、投资等，视同销售。外购货物用于集体福利、个人消费不视同销售。"},
            {id:49,type:"判断",point:"所得税",text:"个体工商户业主的工资薪金支出，不得在个人所得税前扣除。",answer:"正确",explanation:"个体工商户业主的工资薪金支出不得在税前扣除，但可以扣除生计费（每月 5000 元）。"},
            {id:50,type:"单选",point:"会计法律制度",text:"下列各项中，不属于会计工作岗位的是？",options:{A:"出纳",B:"稽核",C:"会计机构负责人",D:"审计"},answer:"D",explanation:"审计岗位不属于会计工作岗位。会计工作岗位包括：出纳、稽核、资本基金核算、收入支出核算、债权债务核算等。"}
        ];
        
        let userAnswers = { accounting: {}, economy: {} };
        let scores = { accounting: 0, economy: 0 };
        let answeredCount = { accounting: 0, economy: 0 };
        let wrongQuestions = { accounting: [], economy: [] };
        
        function renderQuestions(questions, containerId, subject) {
            const container = document.getElementById(containerId);
            container.innerHTML = questions.map((q, index) => `
                <div class="question-card" id="${subject}-q${index}" data-point="${q.point}">
                    <div class="question-header">
                        <span class="question-number">第${index + 1}题</span>
                        <span class="question-type">${q.type}</span>
                    </div>
                    <div class="knowledge-point">📌 ${q.point}</div>
                    <div class="question-text">${q.text}</div>
                    <ul class="options">${renderOptions(q, subject, index)}</ul>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="checkAnswer('${subject}', ${index})">✅ 提交答案</button>
                        <button class="btn btn-info" onclick="showExplanation('${subject}', ${index})" style="display:none;" id="${subject}-explain-btn${index}">📖 查看解析</button>
                    </div>
                    <div class="explanation" id="${subject}-explain${index}">
                        <h4>✅ 正确答案：${q.answer}</h4>
                        <p>${q.explanation}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function renderOptions(q, subject, index) {
            if (q.type === "判断") {
                return `<li class="option" onclick="selectOption('${subject}', ${index}, '正确', this)"><span class="option-label">✓</span><span>正确</span></li>
                        <li class="option" onclick="selectOption('${subject}', ${index}, '错误', this)"><span class="option-label">✗</span><span>错误</span></li>`;
            } else {
                return Object.entries(q.options).map(([key, value]) => 
                    `<li class="option" onclick="selectOption('${subject}', ${index}, '${key}', this)"><span class="option-label">${key}</span><span>${value}</span></li>`
                ).join('');
            }
        }
        
        function selectOption(subject, index, answer, element) {
            const container = document.getElementById(`${subject}-q${index}`);
            container.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            userAnswers[subject][index] = answer;
        }
        
        function checkAnswer(subject, index) {
            const userAnswer = userAnswers[subject][index];
            if (!userAnswer) { alert('请先选择一个答案！'); return; }
            
            const questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            const question = questions[index];
            const card = document.getElementById(`${subject}-q${index}`);
            const options = card.querySelectorAll('.option');
            
            options.forEach(opt => {
                const label = opt.querySelector('.option-label').textContent;
                if (label === question.answer) opt.classList.add('correct');
                else if (label === userAnswer && userAnswer !== question.answer) opt.classList.add('incorrect');
            });
            
            options.forEach(opt => opt.style.pointerEvents = 'none');
            document.getElementById(`${subject}-explain-btn${index}`).style.display = 'inline-block';
            updateScore(subject, index, userAnswer === question.answer);
            updateProgress(subject);
            updateStats();
        }
        
        function showExplanation(subject, index) {
            document.getElementById(`${subject}-explain${index}`).classList.toggle('show');
        }
        
        function updateScore(subject, index, correct) {
            if (correct && !userAnswers[subject][index + '_scored']) {
                scores[subject]++;
                userAnswers[subject][index + '_scored'] = true;
                updateTotalScore();
            } else if (!correct && !wrongQuestions[subject].includes(index)) {
                wrongQuestions[subject].push(index);
            }
        }
        
        function updateTotalScore() {
            document.getElementById('accounting-score').textContent = scores.accounting;
            document.getElementById('economy-score').textContent = scores.economy;
            document.getElementById('total-score').textContent = `${scores.accounting + scores.economy} / 100`;
            
            const total = scores.accounting + scores.economy;
            let level = '';
            if (total >= 90) level = '⭐ 优秀 (90%+)';
            else if (total >= 75) level = '✅ 良好 (75%+)';
            else if (total >= 60) level = '📖 合格 (60%+)';
            else level = '💪 需要加强 (<60%)';
            document.getElementById('score-level').textContent = level;
        }
        
        function updateProgress(subject) {
            const answered = Object.keys(userAnswers[subject]).filter(k => !k.includes('_scored')).length;
            const total = subject === 'accounting' ? 50 : 50;
            const percentage = (answered / total) * 100;
            document.getElementById(`${subject}-progress`).style.width = `${percentage}%`;
        }
        
        function updateStats() {
            const accAnswered = Object.keys(userAnswers.accounting).filter(k => !k.includes('_scored')).length;
            const ecoAnswered = Object.keys(userAnswers.economy).filter(k => !k.includes('_scored')).length;
            const totalAnswered = accAnswered + ecoAnswered;
            const totalCorrect = scores.accounting + scores.economy;
            const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            const remaining = 100 - totalAnswered;
            
            document.getElementById('total-answered').textContent = totalAnswered;
            document.getElementById('total-correct').textContent = totalCorrect;
            document.getElementById('accuracy-rate').textContent = accuracy + '%';
            document.getElementById('remaining').textContent = remaining;
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
        
        function filterQuestions(subject, point) {
            const cards = document.querySelectorAll(`#${subject}-questions .question-card`);
            cards.forEach(card => {
                if (point === 'all' || card.dataset.point === point) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        function startPractice(subject, mode) {
            let questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            
            if (mode === 'random') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 10);
            } else if (mode === 'weak') {
                const wrongIds = wrongQuestions[subject];
                if (wrongIds.length === 0) {
                    alert('太棒了！还没有错题，先做全部练习吧！');
                    return;
                }
                questions = questions.filter((q, index) => wrongIds.includes(index));
            }
            
            renderQuestions(questions, `${subject}-questions`, subject);
            userAnswers[subject] = {};
            scores[subject] = 0;
            wrongQuestions[subject] = [];
            document.getElementById(`${subject}-progress`).style.width = '0%';
            updateStats();
            showSection(subject);
        }
        
        function resetAll() {
            userAnswers = { accounting: {}, economy: {} };
            scores = { accounting: 0, economy: 0 };
            wrongQuestions = { accounting: [], economy: [] };
            document.getElementById('accounting-progress').style.width = '0%';
            document.getElementById('economy-progress').style.width = '0%';
            updateTotalScore();
            updateStats();
            renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
            renderQuestions(economyQuestions, 'economy-questions', 'economy');
            showSection('accounting');
        }
        
        renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
        renderQuestions(economyQuestions, 'economy-questions', 'economy');
    </script>
</body>
</html>
