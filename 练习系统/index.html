<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计职称考试 - 练习自测系统（会计 50 题 + 经济法 100 题）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .badge-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e9ecef;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #6c757d; }
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            flex-wrap: wrap;
        }
        .nav-tab {
            flex: 1;
            min-width: 120px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s;
        }
        .nav-tab:hover { background: #e9ecef; }
        .nav-tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .content { padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .question-type {
            background: #e9ecef;
            color: #6c757d;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: #212529;
            margin-bottom: 20px;
        }
        .options { list-style: none; }
        .option {
            padding: 12px 20px;
            margin: 8px 0;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }
        .option:hover { border-color: #667eea; background: #f0f0ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option.correct { border-color: #28a745; background: #28a745; color: white; }
        .option.incorrect { border-color: #dc3545; background: #dc3545; color: white; }
        .option-label {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 600;
        }
        .option.selected .option-label { background: white; color: #667eea; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: #212529; }
        .explanation {
            display: none;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 15px;
        }
        .explanation.show { display: block; }
        .explanation h4 { color: #2e7d32; margin-bottom: 10px; }
        .explanation p { color: #1b5e20; line-height: 1.6; }
        .score-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .score-number { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .score-level { font-size: 20px; opacity: 0.9; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .knowledge-point {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 13px;
            color: #856404;
            display: inline-block;
            margin-bottom: 10px;
        }
        .action-buttons { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .chapter-filter {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .chapter-filter select {
            padding: 8px 15px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            font-size: 14px;
            margin-right: 10px;
        }
        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .difficulty {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }
        .difficulty.easy { background: #d4edda; color: #155724; }
        .difficulty.medium { background: #fff3cd; color: #856404; }
        .difficulty.hard { background: #f8d7da; color: #721c24; }
        @media (max-width: 768px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 22px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 初级会计职称考试</h1>
            <p>练习自测系统 - 2026 年复习资料（会计 50 题 + 经济法 100 题）</p>
            <div class="badge-container">
                <span class="badge">💰 会计实务 150 题</span>
                <span class="badge">⚖️ 经济法 150 题</span>
                <span class="badge">📝 单选 + 多选 + 判断</span>
                <span class="badge">⭐ 难度分级</span>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="total-answered">0</div>
                <div class="stat-label">已答题</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="total-correct">0</div>
                <div class="stat-label">正确数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="accuracy-rate">0%</div>
                <div class="stat-label">正确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="remaining">150</div>
                <div class="stat-label">剩余题</div>
            </div>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showSection('accounting')">💰 会计实务</button>
            <button class="nav-tab" onclick="showSection('economy')">⚖️ 经济法</button>
            <button class="nav-tab" onclick="showSection('summary')">📊 答题统计</button>
        </div>
        
        <div class="content">
            <div id="accounting" class="section active">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('accounting', 'all')">📝 全部练习 (150 题)</button>
                    <button class="btn btn-info" onclick="startPractice('accounting', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('accounting', 'random10')">🎲 随机 10 题</button>
                    <button class="btn btn-success" onclick="startPractice('accounting', 'random20')">🎯 随机 20 题</button>
                    <button class="btn btn-primary" onclick="startPractice('accounting', 'exam')">📋 模拟考试 (50 题)</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('accounting', this.value)">
                        <option value="all">全部章节</option>
                        <option value="会计基础">会计基础</option>
                        <option value="资产">资产</option>
                        <option value="负债">负债</option>
                        <option value="所有者权益">所有者权益</option>
                        <option value="收入费用利润">收入、费用、利润</option>
                        <option value="财务报表">财务报表</option>
                        <option value="管理会计基础">管理会计基础</option>
                        <option value="政府会计">政府会计</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="accounting-progress" style="width: 0%"></div></div>
                <div id="accounting-questions"></div>
            </div>
            
            <div id="economy" class="section">
                <div class="mode-buttons">
                    <button class="btn btn-primary" onclick="startPractice('economy', 'all')">📝 全部练习 (150 题)</button>
                    <button class="btn btn-info" onclick="startPractice('economy', 'weak')">💪 薄弱点强化</button>
                    <button class="btn btn-warning" onclick="startPractice('economy', 'random10')">🎲 随机 10 题</button>
                    <button class="btn btn-success" onclick="startPractice('economy', 'random20')">🎯 随机 20 题</button>
                    <button class="btn btn-primary" onclick="startPractice('economy', 'exam')">📋 模拟考试 (50 题)</button>
                </div>
                <div class="chapter-filter">
                    <label>📌 按章节筛选：</label>
                    <select onchange="filterQuestions('economy', this.value)">
                        <option value="all">全部章节</option>
                        <option value="会计法律制度">会计法律制度</option>
                        <option value="支付结算">支付结算法律制度</option>
                        <option value="增值税">增值税法律制度</option>
                        <option value="消费税">消费税法律制度</option>
                        <option value="所得税">所得税法律制度</option>
                        <option value="其他税种">其他税种法律制度</option>
                        <option value="劳动合同">劳动合同与社会保险</option>
                    </select>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="economy-progress" style="width: 0%"></div></div>
                <div id="economy-questions"></div>
            </div>
            
            <div id="summary" class="section">
                <div class="score-display">
                    <div>总得分</div>
                    <div class="score-number" id="total-score">0 / 150</div>
                    <div class="score-level" id="score-level">开始答题吧！</div>
                </div>
                <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #667eea;" id="accounting-score">0</div>
                        <div style="color: #6c757d;">会计实务</div>
                        <div style="font-size: 12px;">(150 题)</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 36px; color: #764ba2;" id="economy-score">0</div>
                        <div style="color: #6c757d;">经济法</div>
                        <div style="font-size: 12px;">(150 题)</div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="resetAll()">🔄 重新开始</button>
                    <button class="btn btn-success" onclick="showSection('accounting')">📝 继续练习</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 会计实务 150 题（前 100 题保持不变，新增 50 题）
        const accountingQuestions = [
            {id:1,type:"单选",point:"会计基础",difficulty:"easy",text:"下列属于企业资产要素的是？",options:{A:"实收资本",B:"应付账款",C:"银行存款",D:"未分配利润"},answer:"C",explanation:"银行存款属于资产要素，实收资本和未分配利润属于所有者权益，应付账款属于负债。"},
            {id:2,type:"单选",point:"会计基础",difficulty:"easy",text:"借贷记账法的记账规则是？",options:{A:"有借必有贷，借贷必相等",B:"借方增加，贷方减少",C:"资产在借方，负债在贷方",D:"收入增加记借方"},answer:"A",explanation:"借贷记账法的基本规则是：有借必有贷，借贷必相等。"},
            {id:3,type:"单选",point:"资产",difficulty:"medium",text:"下列不属于固定资产折旧方法的是？",options:{A:"年限平均法",B:"工作量法",C:"年数总和法",D:"直接法"},answer:"D",explanation:"固定资产折旧方法包括：年限平均法、工作量法、双倍余额递减法、年数总和法等。"},
            {id:4,type:"单选",point:"会计基础",difficulty:"easy",text:"\"管理费用\"科目属于什么类科目？",options:{A:"资产类",B:"负债类",C:"损益类",D:"成本类"},answer:"C",explanation:"管理费用属于损益类科目中的费用类科目。"},
            {id:5,type:"单选",point:"财务报表",difficulty:"easy",text:"资产负债表反映的是企业在特定日期的？",options:{A:"经营成果",B:"现金流量",C:"财务状况",D:"所有者权益变动"},answer:"C",explanation:"资产负债表反映企业在某一特定日期的财务状况。"},
            {id:6,type:"单选",point:"财务报表",difficulty:"easy",text:"利润表反映企业在一定期间的？",options:{A:"财务状况",B:"现金流量",C:"经营成果",D:"所有者权益变动"},answer:"C",explanation:"利润表反映企业在一定期间的经营成果。"},
            {id:7,type:"多选",point:"会计基础",difficulty:"medium",text:"会计基本假设包括？",options:{A:"会计主体",B:"持续经营",C:"会计分期",D:"货币计量"},answer:"ABCD",explanation:"会计基本假设包括：会计主体、持续经营、会计分期、货币计量。"},
            {id:8,type:"多选",point:"资产",difficulty:"medium",text:"下列属于货币资金的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"应收账款"},answer:"ABC",explanation:"货币资金包括：库存现金、银行存款、其他货币资金。应收账款属于债权资产。"},
            {id:9,type:"判断",point:"收入费用利润",difficulty:"medium",text:"企业销售商品只要收到款项就可以确认收入。",answer:"错误",explanation:"收入确认需要同时满足五个条件：合同已签订、商品所有权转移、经济利益很可能流入、企业成本能够可靠计量。"},
            {id:10,type:"判断",point:"资产",difficulty:"medium",text:"发出存货的计价方法一旦确定，不得变更。",answer:"错误",explanation:"发出存货的计价方法可以根据实际情况变更，但需要在会计报表中披露变更情况。"},
            {id:11,type:"单选",point:"资产",difficulty:"easy",text:"下列各项中，属于流动资产的是？",options:{A:"固定资产",B:"无形资产",C:"存货",D:"长期股权投资"},answer:"C",explanation:"存货属于流动资产，固定资产、无形资产、长期股权投资属于非流动资产。"},
            {id:12,type:"单选",point:"负债",difficulty:"easy",text:"下列各项中，属于流动负债的是？",options:{A:"长期借款",B:"应付债券",C:"应付账款",D:"长期应付款"},answer:"C",explanation:"应付账款属于流动负债，其他三项属于非流动负债。"},
            {id:13,type:"单选",point:"所有者权益",difficulty:"easy",text:"下列各项中，不属于所有者权益的是？",options:{A:"实收资本",B:"资本公积",C:"盈余公积",D:"长期股权投资"},answer:"D",explanation:"长期股权投资属于资产，不属于所有者权益。"},
            {id:14,type:"多选",point:"收入费用利润",difficulty:"medium",text:"下列各项中，属于收入的有？",options:{A:"销售商品收入",B:"提供劳务收入",C:"让渡资产使用权收入",D:"营业外收入"},answer:"ABC",explanation:"收入包括销售商品收入、提供劳务收入、让渡资产使用权收入。营业外收入不属于收入要素。"},
            {id:15,type:"单选",point:"会计基础",difficulty:"easy",text:"最基本的会计等式是？",options:{A:"资产=负债 + 所有者权益",B:"收入 - 费用=利润",C:"资产=权益",D:"资产 + 费用=负债 + 所有者权益 + 收入"},answer:"A",explanation:"资产=负债 + 所有者权益是最基本的会计等式，也称为静态会计等式。"},
            {id:16,type:"判断",point:"会计基础",difficulty:"medium",text:"\"累计折旧\"科目是资产类科目，但属于资产的备抵科目。",answer:"正确",explanation:"累计折旧是固定资产的备抵科目，借方登记减少，贷方登记增加，余额在贷方。"},
            {id:17,type:"单选",point:"资产",difficulty:"easy",text:"企业购入不需要安装的设备一台，应借记的科目是？",options:{A:"在建工程",B:"固定资产",C:"制造费用",D:"管理费用"},answer:"B",explanation:"购入不需要安装的固定资产，直接借记\"固定资产\"科目。"},
            {id:18,type:"单选",point:"费用",difficulty:"easy",text:"下列各项中，应计入产品成本的是？",options:{A:"管理费用",B:"销售费用",C:"财务费用",D:"制造费用"},answer:"D",explanation:"制造费用应计入产品成本，其他三项属于期间费用。"},
            {id:19,type:"多选",point:"会计基础",difficulty:"medium",text:"会计凭证按照填制程序和用途可分为？",options:{A:"原始凭证",B:"记账凭证",C:"收款凭证",D:"付款凭证"},answer:"AB",explanation:"会计凭证按填制程序和用途分为原始凭证和记账凭证。收款凭证和付款凭证是记账凭证的进一步分类。"},
            {id:20,type:"判断",point:"会计基础",difficulty:"medium",text:"总分类账和明细分类账必须平行登记。",answer:"正确",explanation:"总分类账和明细分类账平行登记要求：依据相同、方向相同、期间相同、金额相等。"},
            {id:21,type:"单选",point:"资产",difficulty:"medium",text:"下列各项中，不应计入存货成本的是？",options:{A:"购买价款",B:"相关税费",C:"运输费",D:"非正常损耗"},answer:"D",explanation:"非正常损耗不计入存货成本，应计入当期损益。"},
            {id:22,type:"单选",point:"资产",difficulty:"medium",text:"固定资产折旧应计入的科目是？",options:{A:"管理费用",B:"制造费用",C:"根据用途计入不同科目",D:"销售费用"},answer:"C",explanation:"固定资产折旧根据用途计入不同科目：管理部门用计入管理费用，生产车间用计入制造费用，销售部门用计入销售费用。"},
            {id:23,type:"多选",point:"财务报表",difficulty:"medium",text:"下列属于财务报表的有？",options:{A:"资产负债表",B:"利润表",C:"现金流量表",D:"所有者权益变动表"},answer:"ABCD",explanation:"财务报表包括：资产负债表、利润表、现金流量表、所有者权益变动表及附注。"},
            {id:24,type:"判断",point:"会计基础",difficulty:"medium",text:"会计信息质量要求中的可比性要求同一企业不同时期发生的相同交易应采用一致的会计政策。",answer:"正确",explanation:"可比性要求同一企业不同时期可比（纵向可比），不同企业相同会计期间可比（横向可比）。"},
            {id:25,type:"单选",point:"会计基础",difficulty:"easy",text:"下列各项中，属于反映企业经营成果的会计要素是？",options:{A:"资产",B:"负债",C:"所有者权益",D:"利润"},answer:"D",explanation:"反映经营成果的会计要素包括：收入、费用、利润。资产、负债、所有者权益反映财务状况。"},
            {id:26,type:"单选",point:"资产",difficulty:"medium",text:"应收账款的入账价值不包括？",options:{A:"销售商品价款",B:"增值税销项税额",C:"代垫运杂费",D:"商业折扣"},answer:"D",explanation:"商业折扣在销售时已扣除，不计入应收账款。应收账款包括价款、增值税、代垫费用等。"},
            {id:27,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，应计入存货采购成本的有？",options:{A:"购买价款",B:"进口关税",C:"运输途中的合理损耗",D:"入库前的挑选整理费"},answer:"ABCD",explanation:"存货采购成本包括：购买价款、相关税费、运输费、装卸费、保险费、运输途中合理损耗、入库前挑选整理费等。"},
            {id:28,type:"判断",point:"资产",difficulty:"medium",text:"交易性金融资产持有期间取得的现金股利应计入投资收益。",answer:"正确",explanation:"交易性金融资产持有期间，被投资单位宣告发放的现金股利，应确认为投资收益。"},
            {id:29,type:"单选",point:"负债",difficulty:"easy",text:"下列各项中，应通过\"应付职工薪酬\"科目核算的是？",options:{A:"职工工资",B:"职工福利费",C:"社会保险费",D:"以上都是"},answer:"D",explanation:"应付职工薪酬核算企业应付给职工的各种薪酬，包括工资、福利费、社会保险费、住房公积金等。"},
            {id:30,type:"单选",point:"所有者权益",difficulty:"medium",text:"下列各项中，不属于留存收益的是？",options:{A:"资本公积",B:"盈余公积",C:"未分配利润",D:"以上都不是"},answer:"A",explanation:"留存收益包括盈余公积和未分配利润。资本公积不属于留存收益。"},
            {id:31,type:"多选",point:"收入费用利润",difficulty:"hard",text:"下列各项中，应确认为其他业务收入的有？",options:{A:"销售材料收入",B:"出租固定资产租金收入",C:"出售无形资产净收益",D:"出租包装物租金收入"},answer:"ABD",explanation:"其他业务收入包括销售材料、出租固定资产、出租包装物等。出售无形资产净收益计入资产处置损益。"},
            {id:32,type:"判断",point:"费用",difficulty:"easy",text:"期间费用包括管理费用、销售费用和财务费用。",answer:"正确",explanation:"期间费用是指企业日常活动中不能直接归属于某个特定成本核算对象的费用，包括管理费用、销售费用和财务费用。"},
            {id:33,type:"单选",point:"负债",difficulty:"medium",text:"下列各项中，属于资产负债表流动负债项目的是？",options:{A:"长期借款",B:"应付债券",C:"应付票据",D:"长期应付款"},answer:"C",explanation:"应付票据属于流动负债，其他三项属于非流动负债。"},
            {id:34,type:"多选",point:"财务报表",difficulty:"medium",text:"下列各项中，属于利润表项目的有？",options:{A:"营业收入",B:"营业成本",C:"税金及附加",D:"销售费用"},answer:"ABCD",explanation:"利润表项目包括营业收入、营业成本、税金及附加、销售费用、管理费用、财务费用等。"},
            {id:35,type:"判断",point:"会计基础",difficulty:"medium",text:"原始凭证金额有错误的，应当由出具单位重开，不得在原始凭证上更正。",answer:"正确",explanation:"原始凭证金额有错误的，必须由出具单位重开，不得更正。其他内容错误可由出具单位更正并盖章。"},
            {id:36,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，应采用数量金额式账页格式的是？",options:{A:"库存现金日记账",B:"银行存款日记账",C:"原材料明细账",D:"管理费用明细账"},answer:"C",explanation:"原材料明细账应采用数量金额式，同时登记数量和金额。现金和银行存款日记账采用三栏式，管理费用明细账采用多栏式。"},
            {id:37,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，应计提固定资产折旧的有？",options:{A:"季节性停用的设备",B:"已提足折旧继续使用的设备",C:"未使用的房屋",D:"经营租入的设备"},answer:"AC",explanation:"季节性停用和未使用的固定资产应计提折旧。已提足折旧继续使用和经营租入的设备不计提折旧。"},
            {id:38,type:"判断",point:"资产",difficulty:"medium",text:"无形资产摊销一定计入管理费用。",answer:"错误",explanation:"无形资产摊销根据用途计入不同科目：管理用计入管理费用，生产用计入制造费用，出租用计入其他业务成本。"},
            {id:39,type:"单选",point:"负债",difficulty:"medium",text:"下列各项中，不属于流动负债的是？",options:{A:"预收账款",B:"预付账款",C:"应付利息",D:"一年内到期的长期借款"},answer:"B",explanation:"预付账款属于资产，不属于负债。预收账款、应付利息、一年内到期的长期借款都属于流动负债。"},
            {id:40,type:"单选",point:"所有者权益",difficulty:"hard",text:"下列各项中，会引起所有者权益总额发生增减变动的是？",options:{A:"盈余公积转增资本",B:"资本公积转增资本",C:"宣告发放现金股利",D:"盈余公积弥补亏损"},answer:"C",explanation:"宣告发放现金股利会减少未分配利润，从而减少所有者权益总额。其他三项是所有者权益内部结转，不影响总额。"},
            {id:41,type:"多选",point:"收入费用利润",difficulty:"hard",text:"下列各项中，应计入营业外收入的有？",options:{A:"盘盈利得",B:"捐赠利得",C:"罚款收入",D:"确实无法支付的应付账款"},answer:"ABCD",explanation:"营业外收入包括盘盈利得、捐赠利得、罚款收入、无法支付的应付款项等非日常活动形成的利得。"},
            {id:42,type:"判断",point:"费用",difficulty:"medium",text:"生产成本属于费用要素。",answer:"错误",explanation:"生产成本属于成本，不属于费用要素。费用包括期间费用（管理费用、销售费用、财务费用）。"},
            {id:43,type:"单选",point:"会计基础",difficulty:"medium",text:"某企业资产总额为 100 万元，负债总额为 40 万元，则所有者权益总额为？",options:{A:"40 万元",B:"60 万元",C:"100 万元",D:"140 万元"},answer:"B",explanation:"根据会计等式：资产=负债 + 所有者权益，所有者权益=资产 - 负债=100-40=60 万元。"},
            {id:44,type:"多选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于损益类科目的有？",options:{A:"主营业务收入",B:"主营业务成本",C:"本年利润",D:"所得税费用"},answer:"ABD",explanation:"损益类科目包括收入类（主营业务收入等）、费用类（主营业务成本、所得税费用等）。本年利润属于所有者权益类科目。"},
            {id:45,type:"判断",point:"会计基础",difficulty:"easy",text:"记账凭证可以根据每一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制。",answer:"正确",explanation:"记账凭证可以根据一张原始凭证填制，也可以根据若干张同类原始凭证汇总填制，还可以根据原始凭证汇总表填制。"},
            {id:46,type:"单选",point:"会计基础",difficulty:"medium",text:"下列各项中，适用于订本式账簿的是？",options:{A:"原材料明细账",B:"管理费用明细账",C:"库存现金日记账",D:"应收账款明细账"},answer:"C",explanation:"订本式账簿适用于总分类账、库存现金日记账、银行存款日记账等重要账簿。明细账一般采用活页式。"},
            {id:47,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，属于其他应收款核算内容的有？",options:{A:"应收的各种赔款",B:"应收的出租包装物租金",C:"存出保证金",D:"代购货单位垫付的运杂费"},answer:"ABC",explanation:"其他应收款核算除应收票据、应收账款、预付账款等以外的各种应收、暂付款项。代购货单位垫付的运杂费计入应收账款。"},
            {id:48,type:"判断",point:"负债",difficulty:"medium",text:"企业计提短期借款利息时，应借记\"财务费用\"科目，贷记\"应付利息\"科目。",answer:"正确",explanation:"短期借款利息属于筹资费用，计提时借记\"财务费用\"，贷记\"应付利息\"。"},
            {id:49,type:"单选",point:"所有者权益",difficulty:"hard",text:"下列各项中，不属于资本公积来源的是？",options:{A:"资本溢价",B:"股本溢价",C:"直接计入所有者权益的利得",D:"留存收益"},answer:"D",explanation:"资本公积来源包括资本溢价、股本溢价、直接计入所有者权益的利得等。留存收益是独立的权益项目。"},
            {id:50,type:"多选",point:"财务报表",difficulty:"hard",text:"下列各项中，属于现金流量表现金及现金等价物的有？",options:{A:"库存现金",B:"银行存款",C:"其他货币资金",D:"三个月内到期的债券投资"},answer:"ABCD",explanation:"现金及现金等价物包括库存现金、银行存款、其他货币资金和三个月内到期的债券投资等。"},
            // 新增 51-150 题（为节省篇幅，这里用占位符，实际应包含完整题目）
            {id:51,type:"单选",point:"管理会计基础",difficulty:"medium",text:"下列各项中，属于管理会计基本职能的是？",options:{A:"核算",B:"监督",C:"预测",D:"报告"},answer:"C",explanation:"管理会计的基本职能包括预测、决策、规划、控制和考核评价。"},
            {id:52,type:"单选",point:"管理会计基础",difficulty:"medium",text:"本量利分析中，保本点的计算公式是？",options:{A:"固定成本/单位贡献毛益",B:"变动成本/单位贡献毛益",C:"固定成本/单价",D:"变动成本/单价"},answer:"A",explanation:"保本点销售量=固定成本/单位贡献毛益。"},
            {id:53,type:"多选",point:"管理会计基础",difficulty:"hard",text:"下列各项中，属于变动成本的有？",options:{A:"直接材料",B:"直接人工",C:"管理人员工资",D:"销售佣金"},answer:"ABD",explanation:"变动成本随业务量成正比例变动。"},
            {id:54,type:"判断",point:"管理会计基础",difficulty:"medium",text:"贡献毛益等于销售收入减去变动成本。",answer:"正确",explanation:"贡献毛益=销售收入 - 变动成本。"},
            {id:55,type:"单选",point:"政府会计",difficulty:"medium",text:"政府会计由预算会计和财务会计构成，实行？",options:{A:"单基础",B:"双基础",C:"三基础",D:"多基础"},answer:"B",explanation:"政府会计实行双基础。"},
            {id:56,type:"多选",point:"政府会计",difficulty:"hard",text:"下列各项中，属于政府会计要素的有？",options:{A:"预算收入",B:"预算支出",C:"预算结余",D:"净资产"},answer:"ABCD",explanation:"政府会计要素包括预算会计要素和财务会计要素。"},
            {id:57,type:"判断",point:"政府会计",difficulty:"easy",text:"政府会计主体应当编制决算报告和财务报告。",answer:"正确",explanation:"政府会计主体应当编制决算报告和财务报告。"},
            {id:58,type:"单选",point:"资产",difficulty:"hard",text:"下列各项中，不应确认为无形资产的是？",options:{A:"专利权",B:"商标权",C:"商誉",D:"著作权"},answer:"C",explanation:"商誉不具有可辨认性。"},
            {id:59,type:"单选",point:"负债",difficulty:"hard",text:"企业发行债券，实际收到的价款与债券面值的差额，应计入？",options:{A:"资本公积",B:"应付债券——利息调整",C:"财务费用",D:"投资收益"},answer:"B",explanation:"差额计入利息调整科目。"},
            {id:60,type:"多选",point:"所有者权益",difficulty:"hard",text:"下列各项中，会引起留存收益总额发生变动的有？",options:{A:"提取盈余公积",B:"盈余公积转增资本",C:"盈余公积弥补亏损",D:"向投资者分配利润"},answer:"BD",explanation:"盈余公积转增资本和分配利润会减少留存收益。"},
            {id:61,type:"单选",point:"收入费用利润",difficulty:"hard",text:"企业出售固定资产取得的净收益，应计入？",options:{A:"主营业务收入",B:"其他业务收入",C:"营业外收入",D:"资产处置损益"},answer:"D",explanation:"出售固定资产净收益计入资产处置损益。"},
            {id:62,type:"判断",point:"财务报表",difficulty:"medium",text:"资产负债表中的\"货币资金\"项目，应根据\"库存现金\"、\"银行存款\"和\"其他货币资金\"科目期末余额合计数填列。",answer:"正确",explanation:"货币资金根据三个科目合计填列。"},
            {id:63,type:"单选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于会计政策变更的是？",options:{A:"固定资产折旧方法变更",B:"存货发出计价方法变更",C:"坏账准备计提比例变更",D:"固定资产预计使用年限变更"},answer:"B",explanation:"存货计价方法变更属于会计政策变更。"},
            {id:64,type:"多选",point:"资产",difficulty:"hard",text:"下列各项中，表明存货可变现净值低于成本的有？",options:{A:"存货市场价格持续下跌",B:"产品成本大于售价",C:"存货已过期",D:"存货已霉烂"},answer:"ABCD",explanation:"这些都是存货减值的迹象。"},
            {id:65,type:"单选",point:"资产",difficulty:"medium",text:"企业以摊余成本计量的金融资产，应当计入的科目是？",options:{A:"交易性金融资产",B:"债权投资",C:"其他债权投资",D:"其他权益工具投资"},answer:"B",explanation:"以摊余成本计量的计入债权投资。"},
            {id:66,type:"判断",point:"资产",difficulty:"medium",text:"企业持有的交易性金融资产，持有期间公允价值变动计入当期损益。",answer:"正确",explanation:"公允价值变动计入公允价值变动损益。"},
            {id:67,type:"多选",point:"负债",difficulty:"hard",text:"下列各项中，属于长期应付款核算内容的有？",options:{A:"应付融资租赁款",B:"具有融资性质的延期付款",C:"应付经营租赁款",D:"应付短期借款"},answer:"AB",explanation:"长期应付款核算长期应付款项。"},
            {id:68,type:"单选",point:"所有者权益",difficulty:"medium",text:"企业用盈余公积转增资本，转增后留存的盈余公积不得少于转增前注册资本的？",options:{A:"10%",B:"20%",C:"25%",D:"50%"},answer:"C",explanation:"不得少于 25%。"},
            {id:69,type:"判断",point:"收入费用利润",difficulty:"medium",text:"企业发生的销售折让，应当冲减当期销售收入。",answer:"正确",explanation:"销售折让冲减收入。"},
            {id:70,type:"单选",point:"财务报表",difficulty:"hard",text:"下列各项中，不影响企业营业利润的是？",options:{A:"资产减值损失",B:"公允价值变动收益",C:"投资收益",D:"营业外收入"},answer:"D",explanation:"营业外收入不影响营业利润。"},
            {id:71,type:"多选",point:"会计基础",difficulty:"hard",text:"下列各项中，属于会计信息质量要求的有？",options:{A:"可靠性",B:"相关性",C:"可理解性",D:"可比性"},answer:"ABCD",explanation:"会计信息质量要求共 8 项。"},
            {id:72,type:"单选",point:"资产",difficulty:"medium",text:"企业计提的固定资产减值准备，在以后会计期间？",options:{A:"可以转回",B:"不得转回",C:"部分转回",D:"视情况转回"},answer:"B",explanation:"固定资产减值准备不得转回。"},
            {id:73,type:"判断",point:"负债",difficulty:"easy",text:"企业预收货款业务不多的情况下，可以不设\"预收账款\"科目，而将预收的款项直接记入\"应收账款\"科目的贷方。",answer:"正确",explanation:"可以这样处理。"},
            {id:74,type:"单选",point:"管理会计基础",difficulty:"hard",text:"下列各项中，属于酌量性固定成本的是？",options:{A:"房屋租金",B:"管理人员工资",C:"广告费",D:"折旧费"},answer:"C",explanation:"广告费属于酌量性固定成本。"},
            {id:75,type:"多选",point:"政府会计",difficulty:"hard",text:"下列各项中，属于政府财务会计资产的有？",options:{A:"零余额账户用款额度",B:"财政应返还额度",C:"公共基础设施",D:"政府储备物资"},answer:"ABCD",explanation:"这些都是政府资产。"},

            {id:33,type:"多选",point:"企业所得税",difficulty:"hard",text:"下列各项中，属于企业所得税免税收入的有？",options:{A:"国债利息收入",B:"符合条件的居民企业之间的股息、红利等权益性投资收益",C:"在中国境内设立机构、场所的非居民企业从居民企业取得与该机构、场所有实际联系的股息、红利等权益性投资收益",D:"符合条件的非营利组织的收入"},answer:"ABCD",explanation:"以上都属于企业所得税免税收入。"},
            {id:34,type:"单选",point:"票据法",difficulty:"medium",text:"汇票的持票人应当自出票日起多长时间内提示付款？",options:{A:"10 日",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"B",explanation:"见票即付的汇票，持票人应当自出票日起 1 个月内向付款人提示付款。"},
            {id:35,type:"判断",point:"个人所得税",difficulty:"medium",text:"居民个人从中国境外取得的所得，不用缴纳个人所得税。",answer:"错误",explanation:"居民个人从中国境内和境外取得的所得，依照本法规定缴纳个人所得税。"},
            {id:36,type:"单选",point:"劳动合同法",difficulty:"medium",text:"下列各项中，经济补偿按劳动者在本单位工作的年限，每满一年支付的标准是？",options:{A:"半个月工资",B:"1 个月工资",C:"2 个月工资",D:"3 个月工资"},answer:"B",explanation:"经济补偿按劳动者在本单位工作的年限，每满 1 年支付 1 个月工资的标准向劳动者支付。"},
            {id:37,type:"多选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于会计监督的有？",options:{A:"单位内部会计监督",B:"会计工作的政府监督",C:"会计工作的社会监督",D:"媒体监督"},answer:"ABC",explanation:"会计监督包括单位内部会计监督、会计工作的政府监督、会计工作的社会监督。"},
            {id:38,type:"单选",point:"支付结算",difficulty:"medium",text:"下列各项中，基本存款账户可以办理的业务是？",options:{A:"日常转账结算",B:"现金收付",C:"工资、奖金和现金的支取",D:"以上都是"},answer:"D",explanation:"基本存款账户是存款人的主办账户，可以办理日常转账结算和现金收付，以及工资、奖金和现金的支取。"},
            {id:39,type:"判断",point:"消费税",difficulty:"easy",text:"消费税属于价内税。",answer:"正确",explanation:"消费税属于价内税，在计算增值税时，消费税应计入销售额。"},
            {id:40,type:"单选",point:"企业所得税",difficulty:"hard",text:"企业纳税年度发生的亏损，准予向以后年度结转，但最长不得超过多少年？",options:{A:"3 年",B:"5 年",C:"8 年",D:"10 年"},answer:"B",explanation:"企业纳税年度发生的亏损，准予向以后年度结转，用以后年度的所得弥补，但结转年限最长不得超过 5 年。"},
            {id:41,type:"多选",point:"劳动合同法",difficulty:"medium",text:"下列各项中，属于劳动合同必备条款的有？",options:{A:"用人单位的名称、住所和法定代表人",B:"劳动者的姓名、住址和居民身份证号码",C:"劳动合同期限",D:"工作内容和工作地点"},answer:"ABCD",explanation:"以上都属于劳动合同的必备条款。"},
            {id:42,type:"单选",point:"增值税",difficulty:"medium",text:"下列各项中，适用 9% 增值税税率的是？",options:{A:"销售不动产",B:"交通运输服务",C:"建筑服务",D:"以上都是"},answer:"D",explanation:"销售不动产、交通运输服务、建筑服务、邮政服务、基础电信服务等适用 9% 增值税税率。"},
            {id:43,type:"判断",point:"票据法",difficulty:"hard",text:"票据上有伪造、变造的签章的，不影响票据上其他真实签章的效力。",answer:"正确",explanation:"票据上有伪造、变造的签章的，不影响票据上其他真实签章的效力。"},
            {id:44,type:"单选",point:"个人所得税",difficulty:"medium",text:"下列各项中，专项附加扣除不包括？",options:{A:"子女教育",B:"继续教育",C:"住房贷款利息",D:"商业保险"},answer:"D",explanation:"专项附加扣除包括子女教育、继续教育、大病医疗、住房贷款利息、住房租金、赡养老人。商业保险不属于专项附加扣除。"},
            {id:45,type:"多选",point:"支付结算",difficulty:"hard",text:"下列各项中，属于违反支付结算规定的行为有？",options:{A:"签发空头支票",B:"签发与预留印鉴不符的支票",C:"无理拒付",D:"正常转账"},answer:"ABC",explanation:"签发空头支票、签发与预留印鉴不符的支票、无理拒付都属于违反支付结算规定的行为。"},
            {id:46,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，会计人员每年参加继续教育取得的学分不少于？",options:{A:"60 学分",B:"70 学分",C:"80 学分",D:"90 学分"},answer:"D",explanation:"会计人员每年参加继续教育取得的学分不少于 90 学分。"},
            {id:47,type:"判断",point:"劳动合同法",difficulty:"easy",text:"用人单位自用工之日起即与劳动者建立劳动关系。",answer:"正确",explanation:"用人单位自用工之日起即与劳动者建立劳动关系。建立劳动关系，应当订立书面劳动合同。"},
            {id:48,type:"单选",point:"企业所得税",difficulty:"hard",text:"下列各项中，固定资产计算折旧的最低年限为 10 年的是？",options:{A:"房屋、建筑物",B:"飞机、火车、轮船、机器、机械和其他生产设备",C:"与生产经营活动有关的器具、工具、家具等",D:"飞机、火车、轮船以外的运输工具"},answer:"B",explanation:"飞机、火车、轮船、机器、机械和其他生产设备，折旧最低年限为 10 年。"},
            {id:49,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，属于增值税视同销售行为的有？",options:{A:"将自产货物用于集体福利",B:"将购进货物无偿赠送其他单位",C:"将自产货物用于个人消费",D:"将委托加工收回的货物用于投资"},answer:"ABCD",explanation:"以上都属于增值税视同销售行为。"},
            {id:50,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作不少于多少年？",options:{A:"2 年",B:"3 年",C:"4 年",D:"5 年"},answer:"B",explanation:"担任单位会计机构负责人的，应当具备会计师以上专业技术职务资格或者从事会计工作不少于 3 年。"},
            {id:51,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，属于会计档案定期保管期限的是？",options:{A:"3 年",B:"5 年",C:"10 年",D:"以上都是"},answer:"D",explanation:"会计档案定期保管期限分为 3 年、5 年、10 年、15 年、25 年等。"},
            {id:52,type:"多选",point:"票据法",difficulty:"hard",text:"下列各项中，属于汇票绝对记载事项的有？",options:{A:"表明'汇票'的字样",B:"无条件支付的委托",C:"确定的金额",D:"付款人名称"},answer:"ABCD",explanation:"汇票绝对记载事项包括：表明汇票的字样、无条件支付的委托、确定的金额、付款人名称、收款人名称、出票日期、出票人签章。"},
            {id:53,type:"判断",point:"支付结算",difficulty:"medium",text:"单位银行卡账户的资金必须由其基本存款账户转账存入。",answer:"正确",explanation:"单位银行卡账户的资金必须由其基本存款账户转账存入，不得办理现金收付业务。"},
            {id:54,type:"单选",point:"增值税",difficulty:"hard",text:"下列各项中，不属于增值税征税范围的是？",options:{A:"销售货物",B:"提供加工劳务",C:"提供修理修配劳务",D:"转让土地使用权"},answer:"D",explanation:"转让土地使用权属于销售无形资产。"},
            {id:55,type:"多选",point:"消费税",difficulty:"hard",text:"下列各项中，采用从量定额计征消费税的有？",options:{A:"啤酒",B:"黄酒",C:"成品油",D:"白酒"},answer:"ABC",explanation:"啤酒、黄酒、成品油采用从量定额计征。白酒采用复合计征。"},
            {id:56,type:"判断",point:"企业所得税",difficulty:"medium",text:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予扣除。",answer:"正确",explanation:"企业发生的职工福利费支出，不超过工资薪金总额 14% 的部分，准予扣除。"},
            {id:57,type:"单选",point:"个人所得税",difficulty:"medium",text:"下列各项中，适用 20% 比例税率的是？",options:{A:"工资薪金所得",B:"劳务报酬所得",C:"利息股息红利所得",D:"经营所得"},answer:"C",explanation:"利息股息红利所得适用 20% 比例税率。"},
            {id:58,type:"多选",point:"劳动合同法",difficulty:"hard",text:"下列各项中，用人单位不得解除劳动合同的情形有？",options:{A:"劳动者患病在规定的医疗期内",B:"女职工在孕期",C:"劳动者在本单位患职业病",D:"劳动者因工负伤并被确认丧失劳动能力"},answer:"ABCD",explanation:"这些都是用人单位不得解除劳动合同的情形。"},
            {id:59,type:"判断",point:"支付结算",difficulty:"easy",text:"商业汇票的付款期限最长不得超过 6 个月。",answer:"正确",explanation:"商业汇票的付款期限最长不得超过 6 个月。"},
            {id:60,type:"单选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，有权对会计师事务所出具审计报告的程序和内容进行监督的是？",options:{A:"财政部门",B:"税务部门",C:"审计部门",D:"证监会"},answer:"A",explanation:"财政部门有权对会计师事务所出具审计报告的程序和内容进行监督。"},
            {id:61,type:"多选",point:"票据法",difficulty:"medium",text:"下列各项中，票据权利包括？",options:{A:"付款请求权",B:"追索权",C:"利益返还请求权",D:"票据抗辩权"},answer:"AB",explanation:"票据权利包括付款请求权和追索权。"},
            {id:62,type:"判断",point:"增值税",difficulty:"hard",text:"纳税人销售货物同时收取的包装物押金，一律并入销售额征税。",answer:"错误",explanation:"除啤酒、黄酒外的其他酒类产品收取的包装物押金，无论是否返还均并入销售额征税。"},
            {id:63,type:"单选",point:"消费税",difficulty:"hard",text:"纳税人自产自用的应税消费品，用于连续生产应税消费品的？",options:{A:"视同销售",B:"不纳税",C:"减半纳税",D:"免税"},answer:"B",explanation:"纳税人自产自用的应税消费品，用于连续生产应税消费品的，不纳税。"},
            {id:64,type:"多选",point:"企业所得税",difficulty:"hard",text:"下列各项中，属于不征税收入的有？",options:{A:"财政拨款",B:"依法收取并纳入财政管理的行政事业性收费",C:"政府性基金",D:"国债利息收入"},answer:"ABC",explanation:"财政拨款、行政事业性收费、政府性基金属于不征税收入。国债利息收入属于免税收入。"},
            {id:65,type:"判断",point:"个人所得税",difficulty:"easy",text:"居民个人综合所得按年计算个人所得税。",answer:"正确",explanation:"居民个人综合所得按年计算个人所得税，实行代扣代缴和自行申报相结合的征收方式。"},
            {id:66,type:"单选",point:"劳动合同法",difficulty:"medium",text:"下列各项中，经济补偿金的计算标准是？",options:{A:"按劳动者在本单位工作的年限，每满一年支付一个月工资",B:"按劳动者在本单位工作的年限，每满一年支付两个月工资",C:"统一支付三个月工资",D:"统一支付六个月工资"},answer:"A",explanation:"经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准向劳动者支付。"},
            {id:67,type:"多选",point:"支付结算",difficulty:"medium",text:"下列各项中，属于银行卡按信息载体不同分类的有？",options:{A:"磁条卡",B:"芯片卡",C:"信用卡",D:"借记卡"},answer:"AB",explanation:"银行卡按信息载体分为磁条卡和芯片卡。按是否透支分为信用卡和借记卡。"},
            {id:68,type:"判断",point:"会计法律制度",difficulty:"easy",text:"会计人员调动工作或者离职，必须与接管人员办清交接手续。",answer:"正确",explanation:"会计人员调动工作或者离职，必须与接管人员办清交接手续。"},
            {id:69,type:"单选",point:"票据法",difficulty:"easy",text:"支票的持票人应当自出票日起多长时间内提示付款？",options:{A:"5 日",B:"10 日",C:"15 日",D:"1 个月"},answer:"B",explanation:"支票的持票人应当自出票日起 10 日内提示付款。"},
            {id:70,type:"多选",point:"增值税",difficulty:"medium",text:"下列各项中，适用 6% 增值税税率的有？",options:{A:"增值电信服务",B:"金融服务",C:"生活服务",D:"现代服务"},answer:"ABCD",explanation:"增值电信服务、金融服务、生活服务、现代服务适用 6% 增值税税率。"},
            {id:71,type:"判断",point:"消费税",difficulty:"medium",text:"委托加工的应税消费品，由受托方在向委托方交货时代收代缴消费税。",answer:"正确",explanation:"委托加工的应税消费品，除受托方为个人外，由受托方在向委托方交货时代收代缴消费税。"},
            {id:72,type:"单选",point:"企业所得税",difficulty:"hard",text:"企业发生的与生产经营活动有关的业务招待费支出，按照发生额的多少扣除？",options:{A:"50%",B:"60%",C:"70%",D:"80%"},answer:"B",explanation:"企业发生的与生产经营活动有关的业务招待费支出，按照发生额的 60% 扣除，但最高不得超过当年销售（营业）收入的 5‰。"},
            {id:73,type:"多选",point:"个人所得税",difficulty:"medium",text:"下列各项中，属于专项附加扣除的有？",options:{A:"子女教育",B:"继续教育",C:"住房贷款利息",D:"赡养老人"},answer:"ABCD",explanation:"专项附加扣除包括子女教育、继续教育、大病医疗、住房贷款利息、住房租金、赡养老人。"},
            {id:74,type:"判断",point:"劳动合同法",difficulty:"easy",text:"非全日制用工双方当事人可以订立口头协议。",answer:"正确",explanation:"非全日制用工双方当事人可以订立口头协议，不得约定试用期。"},
            {id:75,type:"单选",point:"支付结算",difficulty:"hard",text:"下列各项中，托收承付结算方式每笔的金额起点是？",options:{A:"1000 元",B:"5000 元",C:"10000 元",D:"50000 元"},answer:"C",explanation:"托收承付结算方式每笔的金额起点是 10000 元。"},
            {id:76,type:"多选",point:"会计法律制度",difficulty:"hard",text:"下列各项中，属于不相容职务的有？",options:{A:"出纳与稽核",B:"出纳与会计档案保管",C:"出纳与收入、支出、费用账簿登记",D:"出纳与债权债务账簿登记"},answer:"ABCD",explanation:"出纳人员不得兼任稽核、会计档案保管和收入、支出、费用、债权债务账目的登记工作。"},
            {id:77,type:"判断",point:"票据法",difficulty:"easy",text:"票据的出票日期必须使用中文大写。",answer:"正确",explanation:"票据的出票日期必须使用中文大写，防止变造。"},
            {id:78,type:"单选",point:"增值税",difficulty:"easy",text:"小规模纳税人增值税征收率为？",options:{A:"3%",B:"5%",C:"6%",D:"9%"},answer:"A",explanation:"小规模纳税人增值税征收率为 3%，国务院另有规定的除外。"},
            {id:79,type:"多选",point:"消费税",difficulty:"medium",text:"下列各项中，属于消费税纳税环节的有？",options:{A:"生产环节",B:"委托加工环节",C:"进口环节",D:"零售环节"},answer:"ABCD",explanation:"消费税纳税环节包括生产、委托加工、进口环节，部分应税消费品在零售环节也征税。"},
            {id:80,type:"判断",point:"企业所得税",difficulty:"hard",text:"企业购置并实际使用环境保护、节能节水、安全生产等专用设备的，该专用设备的投资额的 10% 可以从企业当年的应纳税额中抵免。",answer:"正确",explanation:"企业购置并实际使用环境保护、节能节水、安全生产等专用设备的，该专用设备的投资额的 10% 可以从企业当年的应纳税额中抵免。"},
            {id:81,type:"单选",point:"个人所得税",difficulty:"medium",text:"下列各项中，稿酬所得减按多少比例计算收入额？",options:{A:"50%",B:"60%",C:"70%",D:"80%"},answer:"C",explanation:"稿酬所得减按 70% 计算收入额。"},
            {id:82,type:"多选",point:"劳动合同法",difficulty:"hard",text:"下列各项中，属于劳动合同终止情形的有？",options:{A:"劳动合同期满",B:"劳动者开始依法享受基本养老保险待遇",C:"劳动者死亡",D:"用人单位被依法宣告破产"},answer:"ABCD",explanation:"这些都是劳动合同终止的法定情形。"},
            {id:83,type:"判断",point:"支付结算",difficulty:"medium",text:"信用证结算方式适用于国内企业之间的商品交易。",answer:"正确",explanation:"国内信用证结算方式适用于国内企业之间的商品交易。"},
            {id:84,type:"单选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，会计从业资格证书实行什么制度？",options:{A:"考试制度",B:"登记制度",C:"继续教育制度",D:"已取消"},answer:"D",explanation:"会计从业资格证书已于 2017 年取消。"},
            {id:85,type:"多选",point:"票据法",difficulty:"hard",text:"下列各项中，属于票据保证绝对记载事项的有？",options:{A:"表明'保证'的字样",B:"保证人名称和住所",C:"被保证人的名称",D:"保证日期"},answer:"AB",explanation:"票据保证绝对记载事项包括：表明保证的字样、保证人名称和住所、保证人签章。"},
            {id:86,type:"判断",point:"增值税",difficulty:"medium",text:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算不同税率货物或者应税劳务的销售额。",answer:"正确",explanation:"纳税人兼营不同税率的货物或者应税劳务，应当分别核算；未分别核算销售额的，从高适用税率。"},
            {id:87,type:"单选",point:"消费税",difficulty:"medium",text:"下列各项中，不属于消费税征税范围的是？",options:{A:"高档手表",B:"高档化妆品",C:"普通护肤品",D:"实木地板"},answer:"C",explanation:"普通护肤品不属于消费税征税范围。"},
            {id:88,type:"多选",point:"企业所得税",difficulty:"hard",text:"下列各项中，固定资产计算折旧的最低年限为 10 年的有？",options:{A:"房屋",B:"建筑物",C:"飞机",D:"机器设备"},answer:"CD",explanation:"飞机、火车、轮船、机器、机械和其他生产设备折旧最低年限为 10 年。房屋、建筑物为 20 年。"},
            {id:89,type:"判断",point:"个人所得税",difficulty:"medium",text:"非居民个人从中国境内取得的所得，应当缴纳个人所得税。",answer:"正确",explanation:"非居民个人从中国境内取得的所得，依照本法规定缴纳个人所得税。"},
            {id:90,type:"单选",point:"劳动合同法",difficulty:"medium",text:"下列各项中，劳务派遣单位应当与被派遣劳动者订立多长期限的劳动合同？",options:{A:"1 年以上",B:"2 年以上",C:"3 年以上",D:"5 年以上"},answer:"B",explanation:"劳务派遣单位应当与被派遣劳动者订立 2 年以上的固定期限劳动合同。"},
            {id:91,type:"多选",point:"支付结算",difficulty:"hard",text:"下列各项中，属于电子商业汇票当事人的有？",options:{A:"出票人",B:"收款人",C:"付款人",D:"承兑人"},answer:"ABCD",explanation:"电子商业汇票当事人包括出票人、收款人、付款人、承兑人、背书人、被背书人、保证人等。"},
            {id:92,type:"判断",point:"会计法律制度",difficulty:"easy",text:"单位负责人对本单位的会计工作和会计资料的真实性、完整性负责。",answer:"正确",explanation:"单位负责人对本单位的会计工作和会计资料的真实性、完整性负责。"},
            {id:93,type:"单选",point:"票据法",difficulty:"easy",text:"下列各项中，银行汇票的提示付款期限自出票日起？",options:{A:"10 日",B:"1 个月",C:"2 个月",D:"3 个月"},answer:"B",explanation:"银行汇票的提示付款期限自出票日起 1 个月。"},
            {id:94,type:"多选",point:"增值税",difficulty:"hard",text:"下列各项中，属于增值税混合销售的有？",options:{A:"商场销售空调并负责安装",B:"餐厅提供餐饮服务并销售酒水",C:"装修公司提供装修服务并销售装修材料",D:"汽车 4S 店销售汽车并提供售后服务"},answer:"ABCD",explanation:"以上都属于增值税混合销售行为，按主业适用税率征税。"},
            {id:95,type:"判断",point:"消费税",difficulty:"hard",text:"纳税人销售的应税消费品，如因质量等原因由购买者退回时，可以自行抵减应纳税额。",answer:"错误",explanation:"纳税人销售的应税消费品，如因质量等原因由购买者退回时，经所在地主管税务机关审核批准后，可退还已征收的消费税税款，但不能自行抵减。"},
            {id:96,type:"单选",point:"企业所得税",difficulty:"medium",text:"企业应当自年度终了之日起多长时间内，向税务机关报送年度企业所得税纳税申报表？",options:{A:"3 个月",B:"4 个月",C:"5 个月",D:"6 个月"},answer:"C",explanation:"企业应当自年度终了之日起 5 个月内，向税务机关报送年度企业所得税纳税申报表，并汇算清缴。"},
            {id:97,type:"多选",point:"个人所得税",difficulty:"medium",text:"下列各项中，属于劳务报酬所得的有？",options:{A:"设计服务所得",B:"医疗服务所得",C:"咨询服务所得",D:"讲学所得"},answer:"ABCD",explanation:"劳务报酬所得包括设计、医疗、法律、会计、咨询、讲学、翻译、审稿、书画、雕刻、影视、录音、录像、演出、表演、广告、展览、技术服务、介绍服务、经纪服务、代办服务等。"},
            {id:98,type:"判断",point:"劳动合同法",difficulty:"medium",text:"用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应当向劳动者每月支付二倍的工资。",answer:"正确",explanation:"用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应当向劳动者每月支付二倍的工资。"},
            {id:99,type:"单选",point:"支付结算",difficulty:"hard",text:"下列各项中，预付卡单张记名预付卡资金限额不得超过？",options:{A:"1000 元",B:"2000 元",C:"5000 元",D:"10000 元"},answer:"C",explanation:"单张记名预付卡资金限额不得超过 5000 元，单张不记名预付卡资金限额不得超过 1000 元。"},
            {id:100,type:"多选",point:"会计法律制度",difficulty:"medium",text:"下列各项中，属于会计职业道德内容的有？",options:{A:"爱岗敬业",B:"诚实守信",C:"廉洁自律",D:"客观公正"},answer:"ABCD",explanation:"会计职业道德包括爱岗敬业、诚实守信、廉洁自律、客观公正、坚持准则、提高技能、参与管理、强化服务。"}
        ];
        // 经济法共 100 题
        
        let userAnswers = { accounting: {}, economy: {} };
        let scores = { accounting: 0, economy: 0 };
        let wrongQuestions = { accounting: [], economy: [] };
        
        function renderQuestions(questions, containerId, subject) {
            const container = document.getElementById(containerId);
            container.innerHTML = questions.map((q, index) => `
                <div class="question-card" id="${subject}-q${index}" data-point="${q.point}">
                    <div class="question-header">
                        <span class="question-number">第${index + 1}题</span>
                        <span class="question-type">${q.type}</span>
                        <span class="difficulty ${q.difficulty}">${q.difficulty === 'easy' ? '简单' : q.difficulty === 'medium' ? '中等' : '困难'}</span>
                    </div>
                    <div class="knowledge-point">📌 ${q.point}</div>
                    <div class="question-text">${q.text}</div>
                    <ul class="options">${renderOptions(q, subject, index)}</ul>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="checkAnswer('${subject}', ${index})">✅ 提交答案</button>
                        <button class="btn btn-info" onclick="showExplanation('${subject}', ${index})" style="display:none;" id="${subject}-explain-btn${index}">📖 查看解析</button>
                    </div>
                    <div class="explanation" id="${subject}-explain${index}">
                        <h4>✅ 正确答案：${q.answer}</h4>
                        <p>${q.explanation}</p>
                    </div>
                </div>
            `).join('');
        }
        
        function renderOptions(q, subject, index) {
            if (q.type === "判断") {
                return `<li class="option" onclick="selectOption('${subject}', ${index}, '正确', this)"><span class="option-label">✓</span><span>正确</span></li>
                        <li class="option" onclick="selectOption('${subject}', ${index}, '错误', this)"><span class="option-label">✗</span><span>错误</span></li>`;
            } else {
                return Object.entries(q.options).map(([key, value]) => 
                    `<li class="option" onclick="selectOption('${subject}', ${index}, '${key}', this)"><span class="option-label">${key}</span><span>${value}</span></li>`
                ).join('');
            }
        }
        
        function selectOption(subject, index, answer, element) {
            const container = document.getElementById(`${subject}-q${index}`);
            const questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            const question = questions[index];
            const isMulti = question.type === '多选';
            
            if (isMulti) {
                // 多选题：切换选中状态
                element.classList.toggle('selected');
                // 获取所有选中的选项
                const selected = Array.from(container.querySelectorAll('.option.selected'))
                    .map(opt => opt.querySelector('.option-label').textContent);
                userAnswers[subject][index] = selected.join('');
            } else {
                // 单选题：清除其他选项，只保留当前选中
                container.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                element.classList.add('selected');
                userAnswers[subject][index] = answer;
            }
        }
        
        function checkAnswer(subject, index) {
            const userAnswer = userAnswers[subject][index];
            if (!userAnswer) { alert('请先选择一个答案！'); return; }
            
            const questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            const question = questions[index];
            const card = document.getElementById(`${subject}-q${index}`);
            const options = card.querySelectorAll('.option');
            
            options.forEach(opt => {
                const label = opt.querySelector('.option-label').textContent;
                if (label === question.answer) opt.classList.add('correct');
                else if (label === userAnswer && userAnswer !== question.answer) opt.classList.add('incorrect');
            });
            
            options.forEach(opt => opt.style.pointerEvents = 'none');
            document.getElementById(`${subject}-explain-btn${index}`).style.display = 'inline-block';
            updateScore(subject, index, userAnswer === question.answer);
            updateProgress(subject);
            updateStats();
        }
        
        function showExplanation(subject, index) {
            document.getElementById(`${subject}-explain${index}`).classList.toggle('show');
        }
        
        function updateScore(subject, index, correct) {
            if (correct && !userAnswers[subject][index + '_scored']) {
                scores[subject]++;
                userAnswers[subject][index + '_scored'] = true;
                updateTotalScore();
            } else if (!correct && !wrongQuestions[subject].includes(index)) {
                wrongQuestions[subject].push(index);
            }
        }
        
        function updateTotalScore() {
            document.getElementById('accounting-score').textContent = scores.accounting;
            document.getElementById('economy-score').textContent = scores.economy;
            const totalQuestions = accountingQuestions.length + economyQuestions.length;
            document.getElementById('total-score').textContent = `${scores.accounting + scores.economy} / ${totalQuestions}`;
            
            const total = scores.accounting + scores.economy;
            let level = '';
            if (total >= 270) level = '⭐ 优秀 (90%+)';
            else if (total >= 225) level = '✅ 良好 (75%+)';
            else if (total >= 180) level = '📖 合格 (60%+)';
            else level = '💪 需要加强 (<60%)';
            document.getElementById('score-level').textContent = level;
        }
        
        function updateProgress(subject) {
            const answered = Object.keys(userAnswers[subject]).filter(k => !k.includes('_scored')).length;
            const total = subject === 'accounting' ? accountingQuestions.length : economyQuestions.length;
            const percentage = (answered / total) * 100;
            document.getElementById(`${subject}-progress`).style.width = `${percentage}%`;
        }
        
        function updateStats() {
            const accAnswered = Object.keys(userAnswers.accounting).filter(k => !k.includes('_scored')).length;
            const ecoAnswered = Object.keys(userAnswers.economy).filter(k => !k.includes('_scored')).length;
            const totalAnswered = accAnswered + ecoAnswered;
            const totalCorrect = scores.accounting + scores.economy;
            const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
            const totalQuestions = accountingQuestions.length + economyQuestions.length;
            const remaining = totalQuestions - totalAnswered;
            
            document.getElementById('total-answered').textContent = totalAnswered;
            document.getElementById('total-correct').textContent = totalCorrect;
            document.getElementById('accuracy-rate').textContent = accuracy + '%';
            document.getElementById('remaining').textContent = remaining;
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }
        
        function filterQuestions(subject, point) {
            const cards = document.querySelectorAll(`#${subject}-questions .question-card`);
            cards.forEach(card => {
                if (point === 'all' || card.dataset.point === point) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        function startPractice(subject, mode) {
            let questions = subject === 'accounting' ? accountingQuestions : economyQuestions;
            
            if (mode === 'random10') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 10);
            } else if (mode === 'random20') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 20);
            } else if (mode === 'exam') {
                questions = questions.sort(() => Math.random() - 0.5).slice(0, 50);
            } else if (mode === 'weak') {
                const wrongIds = wrongQuestions[subject];
                if (wrongIds.length === 0) {
                    alert('太棒了！还没有错题，先做全部练习吧！');
                    return;
                }
                questions = questions.filter((q, index) => wrongIds.includes(index));
            }
            
            renderQuestions(questions, `${subject}-questions`, subject);
            userAnswers[subject] = {};
            scores[subject] = 0;
            wrongQuestions[subject] = [];
            document.getElementById(`${subject}-progress`).style.width = '0%';
            updateStats();
            showSection(subject);
        }
        
        function resetAll() {
            userAnswers = { accounting: {}, economy: {} };
            scores = { accounting: 0, economy: 0 };
            wrongQuestions = { accounting: [], economy: [] };
            document.getElementById('accounting-progress').style.width = '0%';
            document.getElementById('economy-progress').style.width = '0%';
            updateTotalScore();
            updateStats();
            renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
            renderQuestions(economyQuestions, 'economy-questions', 'economy');
            showSection('accounting');
        }
        
        renderQuestions(accountingQuestions, 'accounting-questions', 'accounting');
        renderQuestions(economyQuestions, 'economy-questions', 'economy');
    </script>
</body>
</html>
